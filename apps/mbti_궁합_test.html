<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MBTI 궁합 테스트 · 미미팩토리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg1:#1a1230; --bg2:#2d1b4e;
  --accent1:#ffd56b; --accent2:#ffb347;
  --cream:#fff6ec; --muted:#cdbfe0;
  --card:#241a3d;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:'Noto Sans KR',sans-serif; color:var(--cream);
  background:
    radial-gradient(120% 80% at 80% -10%, rgba(255,180,90,.10), transparent 55%),
    radial-gradient(120% 90% at 10% 110%, rgba(255,94,138,.12), transparent 55%),
    linear-gradient(160deg,var(--bg1),var(--bg2));
  background-attachment:fixed; min-height:100dvh;
  transition:background .9s ease;
}
.wrap{max-width:520px; margin:0 auto; padding:20px 18px 30px; min-height:100dvh; display:flex; flex-direction:column;}
h1,h2,h3{font-family:'Jua',sans-serif; font-weight:400; margin:0; line-height:1.25;}
.grad{
  background:linear-gradient(105deg,var(--accent1),#ff8a5b 45%,#ff5e8a);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
}
button{font-family:inherit; cursor:pointer; border:none; color:inherit;}
.screen{display:none; animation:fadeIn .5s ease;}
.screen.active{display:block;}
@keyframes fadeIn{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}
.pop{animation:pop .42s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{0%{transform:scale(.9) rotate(-1.5deg); opacity:.4;}60%{transform:scale(1.02) rotate(.5deg);}100%{transform:scale(1) rotate(0); opacity:1;}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-9px);}}

/* ---- 홈 ---- */
.hero{text-align:center; margin:auto 0; padding:10px 0;}
.hero .emoji{font-size:66px; display:inline-block; animation:float 3.2s ease-in-out infinite;}
.hero h1{font-size:34px; margin:14px 0 6px;}
.hero p{color:var(--muted); font-size:15px; line-height:1.7; margin:0 0 4px; word-break:keep-all;}
.hero .sub{font-size:13px; color:#9a8fc0; margin-top:14px;}
.btn{
  display:block; width:100%; padding:17px; border-radius:18px; font-size:18px;
  font-family:'Jua',sans-serif; color:#2a1636; margin-top:13px;
  background:linear-gradient(100deg,var(--accent1),var(--accent2));
  box-shadow:0 10px 26px -8px var(--accent2); transition:transform .15s, box-shadow .3s;
}
.btn:active{transform:scale(.97);}
.btn.ghost{background:rgba(255,255,255,.07); color:var(--cream); box-shadow:none; border:1.5px solid rgba(255,255,255,.14);}
.chips{display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:18px 0 4px;}
.chip{font-size:12px; color:var(--muted); background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); padding:6px 12px; border-radius:99px;}

/* ---- 진단 게이지 ---- */
.topbar{position:sticky; top:0; z-index:10; padding:10px 0 12px; margin-bottom:6px;
  background:linear-gradient(180deg,var(--bg1) 65%,transparent);}
.count{display:flex; justify-content:space-between; align-items:center; font-size:13px; color:var(--muted); margin-bottom:8px;}
.count b{font-family:'Jua'; color:var(--cream); font-size:15px;}
.livecode{font-family:'Jua'; font-size:24px; letter-spacing:.14em;}
.livecode span{opacity:.35; transition:opacity .3s;}
.livecode span.on{opacity:1;}
.axes{display:flex; flex-direction:column; gap:9px;}
.axis{display:grid; grid-template-columns:20px 1fr 20px; align-items:center; gap:8px; font-size:11px; color:#9a8fc0;}
.axis .lbl{font-family:'Jua'; font-size:13px; color:var(--muted); text-align:center;}
.axis .lbl.win{color:var(--cream);}
.track{position:relative; height:8px; border-radius:99px; background:rgba(255,255,255,.09); overflow:hidden;}
.track .mid{position:absolute; left:50%; top:0; bottom:0; width:2px; background:rgba(255,255,255,.18); transform:translateX(-50%);}
.track .fill{position:absolute; top:0; bottom:0; left:50%; width:0%; border-radius:99px;
  background:linear-gradient(90deg,var(--accent1),var(--accent2)); box-shadow:0 0 12px var(--accent2);
  transition:left .45s cubic-bezier(.22,1,.36,1), width .45s cubic-bezier(.22,1,.36,1);}

/* ---- 질문 ---- */
.qcard{background:var(--card); border:1px solid rgba(255,255,255,.08); border-radius:22px; padding:24px 20px; margin-top:14px;
  box-shadow:0 18px 40px -22px rgba(0,0,0,.7);}
.qnum{font-size:12px; color:var(--accent1); font-weight:700; letter-spacing:.05em;}
.qtext{font-size:20px; font-family:'Jua'; line-height:1.45; margin:8px 0 20px; word-break:keep-all;}
.opt{display:flex; align-items:center; gap:13px; width:100%; text-align:left; padding:16px 16px; margin-top:11px;
  border-radius:15px; background:rgba(255,255,255,.05); border:1.5px solid rgba(255,255,255,.12);
  font-size:15.5px; line-height:1.5; transition:transform .12s, background .2s, border-color .2s; color:var(--cream); word-break:keep-all;}
.opt:hover{background:rgba(255,255,255,.09);}
.opt:active{transform:scale(.98);}
.opt .key{flex:0 0 30px; height:30px; border-radius:9px; display:grid; place-items:center; font-family:'Jua'; font-size:16px;
  background:rgba(255,255,255,.1); color:var(--muted);}
.opt.sel{border-color:var(--accent2); background:rgba(255,181,71,.14);}
.opt:focus-visible{outline:3px solid var(--accent1); outline-offset:2px;}

/* ---- 결과 ---- */
.rescard{background:var(--card); border:1px solid rgba(255,255,255,.1); border-radius:26px; padding:28px 22px; text-align:center;
  box-shadow:0 20px 50px -24px rgba(0,0,0,.75);}
.rescard .bigemoji{font-size:74px; display:inline-block; animation:float 3.2s ease-in-out infinite;}
.rescard .code{font-family:'Jua'; font-size:42px; letter-spacing:.08em; margin-top:6px;}
.rescard .nick{font-size:19px; font-family:'Jua'; color:var(--muted); margin-top:2px;}
.rescard .oneline{font-size:14.5px; color:var(--muted); margin-top:12px; line-height:1.7; word-break:keep-all;}
.resbars{margin:22px 0 4px; display:flex; flex-direction:column; gap:12px;}
.rbar{text-align:left;}
.rbar .rtop{display:flex; justify-content:space-between; font-size:12px; color:#9a8fc0; margin-bottom:5px;}
.rbar .rtop b{font-family:'Jua'; font-size:14px;}
.rbar .rtrack{height:10px; border-radius:99px; background:rgba(255,255,255,.08); overflow:hidden;}
.rbar .rfill{height:100%; width:0%; border-radius:99px; background:linear-gradient(90deg,var(--accent1),var(--accent2));
  box-shadow:0 0 10px var(--accent2); transition:width 1s cubic-bezier(.22,1,.36,1);}
.block{background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.08); border-radius:16px; padding:16px 17px; margin-top:12px; text-align:left;}
.block h3{font-size:15px; margin-bottom:7px; display:flex; align-items:center; gap:7px;}
.block p{font-size:14px; line-height:1.72; color:#e7ddf2; margin:0; word-break:keep-all;}

/* ---- 궁합 ---- */
.selrow{display:flex; gap:10px; margin-top:16px;}
.selbox{flex:1; background:var(--card); border:1px solid rgba(255,255,255,.1); border-radius:18px; padding:14px 12px; text-align:center;}
.selbox label{display:block; font-size:12px; color:#9a8fc0; margin-bottom:8px;}
.selbox select{width:100%; padding:11px 8px; border-radius:12px; background:rgba(255,255,255,.06); color:var(--cream);
  border:1.5px solid rgba(255,255,255,.16); font-family:'Jua'; font-size:16px; text-align:center; text-align-last:center;}
.selbox .face{font-size:34px; margin-bottom:4px; height:40px;}
.vs{align-self:center; font-family:'Jua'; font-size:20px; color:var(--accent1);}
.scorewrap{text-align:center; margin-top:22px;}
.scorewrap .pct{font-family:'Jua'; font-size:64px; line-height:1;}
.scorewrap .head{font-size:16px; color:var(--muted); margin-top:6px; font-family:'Jua';}
.heart{font-size:30px; margin-bottom:2px;}
.matchbadge{display:inline-block; font-size:12px; padding:5px 13px; border-radius:99px; margin-top:10px;
  background:rgba(255,181,71,.16); border:1px solid var(--accent2); color:var(--accent1);}
.toast{position:fixed; left:50%; top:74px; transform:translateX(-50%) translateY(-20px);
  background:rgba(36,26,61,.96); border:1.5px solid var(--accent2); color:var(--cream);
  padding:13px 20px; border-radius:99px; font-size:14px; opacity:0; pointer-events:none;
  transition:opacity .4s, transform .4s; z-index:60; max-width:90vw; text-align:center;}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
.mini{font-size:12.5px; color:#9a8fc0; text-align:center; margin-top:16px; line-height:1.6;}
.linkbtn{background:none; text-decoration:underline; color:var(--muted); font-size:13px; padding:8px; margin:6px auto 0; display:block;}
#confetti{position:fixed; inset:0; pointer-events:none; z-index:55;}

/* 푸터 */
.footer{text-align:center; margin-top:28px; padding-top:18px; border-top:1px solid rgba(255,255,255,.08);}
.mf-eyebrow{display:flex; align-items:center; justify-content:center; gap:11px; margin-bottom:8px;}
.mf-eyebrow::before,.mf-eyebrow::after{content:""; height:1px; width:38px; background:linear-gradient(90deg,transparent,rgba(167,139,250,.6));}
.mf-eyebrow::after{transform:scaleX(-1);}
.mf-eyebrow span{font-size:10px; letter-spacing:.42em; text-indent:.42em; color:#9a8fc0; font-weight:500; white-space:nowrap;}
.mf-logo{font-family:'Jua',sans-serif; font-size:27px; line-height:1; margin-bottom:9px; letter-spacing:.01em;
  background:linear-gradient(95deg,#5ee7d8,#7aa6ff 36%,#b78bf5 62%,#ff8ad0);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
.mf-caption{font-size:11.5px; letter-spacing:.1em; color:#9a8fc0;}
@media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }
</style>
</head>
<body>
<canvas id="confetti"></canvas>
<div id="toast" class="toast"></div>
<div class="wrap">

  <!-- ===== 홈 ===== -->
  <section id="home" class="screen active">
    <div class="hero">
      <div class="emoji">💘</div>
      <h1>MBTI <span class="grad">궁합</span> 테스트</h1>
      <p>12문항으로 내 유형을 찾고,<br>좋아하는 사람과의 <b>궁합 %</b>를 확인해요.</p>
      <div class="chips">
        <span class="chip">⏱️ 2분 컷</span>
        <span class="chip">🎯 실시간 게이지</span>
        <span class="chip">💞 256조합 궁합</span>
      </div>
      <p class="sub">선택지엔 정답 단서가 숨겨져 있어요. 마음 가는 대로 솔직하게!</p>
    </div>
    <div>
      <button class="btn" onclick="startTest()">🚀 내 MBTI 진단 시작</button>
      <button class="btn ghost" onclick="go('match')">💞 바로 궁합 보기</button>
    </div>
  </section>

  <!-- ===== 진단 ===== -->
  <section id="test" class="screen">
    <div class="topbar">
      <div class="count"><span><b id="qcount">1</b> / 12 문항</span>
        <span class="livecode" id="livecode"></span></div>
      <div class="axes" id="axes"></div>
    </div>
    <div id="qholder"></div>
  </section>

  <!-- ===== 결과 ===== -->
  <section id="result" class="screen">
    <div class="rescard pop" id="rescard"></div>
    <div class="block"><h3>💡 이런 사람이에요</h3><p id="r-good"></p></div>
    <div class="block"><h3>💖 관계에선 이렇게</h3><p id="r-love"></p></div>
    <div class="block"><h3>⚠️ 이것만 조심</h3><p id="r-warn"></p></div>
    <button class="btn" style="margin-top:16px" onclick="toMatchFromResult()">💞 이 유형으로 궁합 보기</button>
    <button class="btn ghost" onclick="startTest()">🔄 다시 진단하기</button>
    <button class="linkbtn" onclick="go('home')">처음으로</button>
  </section>

  <!-- ===== 궁합 ===== -->
  <section id="match" class="screen">
    <div style="text-align:center; margin-top:6px">
      <h2 style="font-size:26px">💞 <span class="grad">궁합</span> 매칭</h2>
      <p style="color:var(--muted); font-size:13px; margin-top:6px">두 유형을 고르면 바로 계산돼요</p>
    </div>
    <div class="selrow">
      <div class="selbox">
        <div class="face" id="faceA">🙂</div>
        <label>나</label>
        <select id="selA" onchange="calcMatch()"></select>
      </div>
      <div class="vs">💗</div>
      <div class="selbox">
        <div class="face" id="faceB">🙂</div>
        <label>상대</label>
        <select id="selB" onchange="calcMatch()"></select>
      </div>
    </div>

    <div class="rescard" style="margin-top:18px; padding:24px 20px">
      <div class="scorewrap">
        <div class="heart">💓</div>
        <div class="pct" id="pct">--%</div>
        <div class="head" id="matchhead">유형을 골라보세요</div>
        <div class="matchbadge" id="matchbadge" style="display:none"></div>
      </div>
    </div>
    <div class="block"><h3>🧩 닮은 점</h3><p id="m-sim"></p></div>
    <div class="block"><h3>🎚️ 조율 포인트</h3><p id="m-adj"></p></div>
    <div class="block"><h3>✅ 함께라면 이것만</h3><p id="m-tip"></p></div>
    <button class="btn" style="margin-top:16px" onclick="cheer()">💖 우리 궁합 축하하기</button>
    <button class="linkbtn" onclick="go('home')">처음으로</button>
  </section>

  <!-- 푸터 -->
  <div class="footer">
    <div class="mf-eyebrow"><span>의 미 와 재 미 공 장</span></div>
    <div class="mf-logo">미미팩토리</div>
    <div class="mf-caption">주식회사 연:결 패밀리회사</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script>
/* ============ 유틸 ============ */
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function vibrate(p){if(navigator.vibrate)try{navigator.vibrate(p);}catch(e){}}
let _tt; function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2200);}
function go(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function pop(el){el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');}

/* confetti */
const cvs=document.getElementById('confetti');
const myConfetti=(typeof confetti==='function')?confetti.create(cvs,{resize:true,useWorker:true}):null;
function boom(x,y,big){
  if(!myConfetti)return;
  const o={particleCount:big?90:24,spread:big?90:55,startVelocity:big?45:32,scalar:.9,
    origin:{x:x/window.innerWidth,y:y/window.innerHeight},
    colors:['#ffd56b','#ffb347','#ff5e8a','#7aa6ff','#5ee7d8','#b78bf5']};
  myConfetti(o);
  if(big)setTimeout(()=>myConfetti(Object.assign({},o,{angle:120,origin:{x:.7,y:.4}})),160);
}

/* ============ 유형 데이터 ============ */
const TYPES={
 INTJ:{e:'🦉',nick:'용의주도한 전략가',hue:['#7aa6ff','#5b6cff'],
   good:'멀리 내다보고 큰 그림을 그리는 사람. 조용하지만 한번 정한 목표는 끝까지 밀고 나가는 뚝심이 있어요.',
   love:'말보다 행동으로 사랑을 증명해요. 상대에게 "지금 네가 소중하다"는 말을 자주 얹어주면 신뢰가 두 배가 돼요.',
   warn:'감정을 논리로 정리하려다 상대를 서운하게 할 수 있어요. 해결책보다 공감을 먼저 건네보세요.'},
 INTP:{e:'🔬',nick:'논리적인 사색가',hue:['#8ab6ff','#6c7bff'],
   good:'세상의 원리를 파고드는 호기심 대장. 어떤 주제든 새로운 관점으로 뒤집어 보는 재미가 있어요.',
   love:'생각은 깊은데 표현이 늦어요. 머릿속 애정을 짧게라도 자주 말로 꺼내면 오해가 사라져요.',
   warn:'혼자만의 사고 세계에 빠지면 상대가 외로워져요. 정기적으로 "함께의 시간"을 예약해두세요.'},
 ENTJ:{e:'🦁',nick:'대담한 지휘관',hue:['#ff9e6b','#ff6b6b'],
   good:'목표를 향해 사람과 상황을 이끄는 타고난 리더. 추진력과 결단력이 주변을 든든하게 만들어요.',
   love:'관계도 프로젝트처럼 발전시켜요. 다만 이기려 하지 말고 "우리 팀"이라는 감각을 나누면 최고예요.',
   warn:'효율을 앞세우다 상대의 속도를 무시할 수 있어요. 가끔은 결과보다 과정을 함께 즐겨보세요.'},
 ENTP:{e:'🎇',nick:'뜨거운 논쟁가',hue:['#ffb84d','#ff7a5b'],
   good:'아이디어가 샘솟는 재치꾼. 지루할 틈 없는 대화와 반짝이는 발상으로 분위기를 살려요.',
   love:'토론을 사랑이라 여기지만 상대는 상처받을 수도. 이기는 대화 말고 "네 말이 맞아"를 연습해보세요.',
   warn:'새로움을 좇다 관계의 꾸준함을 놓칠 수 있어요. 작은 약속을 지키는 데서 신뢰가 쌓여요.'},
 INFJ:{e:'🌙',nick:'선의의 옹호자',hue:['#a0c4ff','#8a7bff'],
   good:'말없이 상대의 마음을 읽는 통찰가. 깊은 의미와 진심 어린 관계를 소중히 여겨요.',
   love:'상대를 위해 다 맞춰주다 지쳐요. 내 마음도 솔직히 표현해야 관계가 오래가요.',
   warn:'속으로만 서운함을 쌓으면 어느 날 폭발해요. 작을 때 그때그때 부드럽게 말해보세요.'},
 INFP:{e:'🍃',nick:'열정적인 중재자',hue:['#b0e0a0','#7fd1b0'],
   good:'따뜻한 이상주의자. 사람의 가능성과 감정을 소중히 여기고 진심을 다해 아껴요.',
   love:'사랑에 온 마음을 쏟는 로맨티스트. 다만 이상과 현실의 간극에 실망하지 않도록 균형을 잡아요.',
   warn:'상처를 혼자 삭이다 멀어질 수 있어요. 솔직한 대화가 당신을 지켜줘요.'},

const AXDEF=[['EI','E','I'],['SN','S','N'],['TF','T','F'],['JP','J','P']];

/* ============ 상태 ============ */
let qIdx=0, answers=[], score={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0}, myType=null;

function renderAxes(){
  const box=document.getElementById('axes'); box.innerHTML='';
  AXDEF.forEach(([ax,p1,p2])=>{
    const el=document.createElement('div'); el.className='axis'; el.dataset.ax=ax;
    el.innerHTML=`<div class="lbl l1">${p1}</div>
      <div class="track"><div class="mid"></div><div class="fill" data-ax="${ax}"></div></div>
      <div class="lbl l2">${p2}</div>`;
    box.appendChild(el);
  });
  updateAxes();
}
function updateAxes(){
  AXDEF.forEach(([ax,p1,p2])=>{
    const a=score[p1], b=score[p2], tot=a+b;
    const fill=document.querySelector(`.fill[data-ax="${ax}"]`);
    const axEl=document.querySelector(`.axis[data-ax="${ax}"]`);
    if(!fill) return;
    if(tot===0){ fill.style.left='50%'; fill.style.width='0%'; }
    else if(a>=b){ const w=(a/tot)*50; fill.style.left=(50-w)+'%'; fill.style.width=w+'%'; }
    else { const w=(b/tot)*50; fill.style.left='50%'; fill.style.width=w+'%'; }
    if(axEl){
      axEl.querySelector('.l1').classList.toggle('win', a>b);
      axEl.querySelector('.l2').classList.toggle('win', b>a);
    }
  });
  // 실시간 4글자
  const lc=document.getElementById('livecode');
  lc.innerHTML=AXDEF.map(([ax,p1,p2])=>{
    const a=score[p1], b=score[p2];
    const ch = a===b?'·':(a>b?p1:p2);
    const on = a!==b?'on':'';
    return `<span class="${on}">${ch}</span>`;
  }).join('');
}

function startTest(){
  qIdx=0; answers=[]; score={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0}; myType=null;
  renderAxes(); go('test'); renderQ();
}
function renderQ(){
  const q=QS[qIdx];
  document.getElementById('qcount').textContent=qIdx+1;
  const opts=shuffle([{...q.a},{...q.b}]);
  const h=document.getElementById('qholder');
  h.innerHTML=`<div class="qcard pop">
    <div class="qnum">Q${qIdx+1}</div>
    <div class="qtext">${q.q}</div>
    <button class="opt" data-k="${opts[0].k}"><span class="key">A</span><span>${opts[0].t}</span></button>
    <button class="opt" data-k="${opts[1].k}"><span class="key">B</span><span>${opts[1].t}</span></button>
  </div>`;
  h.querySelectorAll('.opt').forEach((b,i)=>{
    b.querySelector('.key').textContent = i===0?'A':'B';
    b.addEventListener('click',ev=>pick(b.dataset.k, ev));
  });
}
function pick(k, ev){
  score[k]++; answers[qIdx]=k;
  updateAxes(); vibrate(22);
  const r=ev.currentTarget.getBoundingClientRect();
  boom(r.left+r.width/2, r.top+r.height/2, false);
  const sel=ev.currentTarget; sel.classList.add('sel');
  if(qIdx===5){ toast('절반 통과! 유형이 만들어지는 중 ✨'); vibrate([18,40,18]); }
  qIdx++;
  if(qIdx>=QS.length){ setTimeout(finishTest,320); }
  else setTimeout(renderQ,240);
}
function finishTest(){
  myType=AXDEF.map(([ax,p1,p2])=>score[p1]>=score[p2]?p1:p2).join('');
  showResult(myType);
}

function showResult(type){
  const t=TYPES[type];
  document.documentElement.style.setProperty('--accent1',t.hue[0]);
  document.documentElement.style.setProperty('--accent2',t.hue[1]);
  const rc=document.getElementById('rescard');
  rc.innerHTML=`<div class="bigemoji">${t.e}</div>
    <div class="code grad">${type}</div>
    <div class="nick">${t.nick}</div>
    <div class="resbars" id="resbars"></div>`;
  const bars=document.getElementById('resbars');
  AXDEF.forEach(([ax,p1,p2])=>{
    const a=score[p1], b=score[p2], tot=a+b||1;
    const win=a>=b?p1:p2, wv=Math.max(a,b), pctv=Math.round(wv/tot*100);
    bars.innerHTML+=`<div class="rbar"><div class="rtop"><span>${p1} ↔ ${p2}</span><b>${win} ${pctv}%</b></div>
      <div class="rtrack"><div class="rfill" data-w="${pctv}"></div></div></div>`;
  });
  document.getElementById('r-good').textContent=t.good;
  document.getElementById('r-love').textContent=t.love;
  document.getElementById('r-warn').textContent=t.warn;
  go('result'); pop(rc);
  requestAnimationFrame(()=>setTimeout(()=>{
    document.querySelectorAll('.rfill').forEach(f=>f.style.width=f.dataset.w+'%');
  },120));
  vibrate([50,70,50,70,120]);
  setTimeout(()=>boom(window.innerWidth/2, window.innerHeight*0.32, true),200);
  toast(`당신은 ${type} · ${t.nick}!`);
}

const TIPS_DIFF={
 EI:'서로의 에너지 리듬을 존중하기 — 함께 놀고, 각자 쉬기.',
 SN:'대화 끝에 "내가 이해한 게 맞아?" 한 번 확인하기.',
 TF:'조언과 위로 중 무엇이 필요한지 먼저 물어보기.',
 JP:'약속은 큰 틀만 정하고 디테일은 서로 배려로 채우기.'};
const TIPS_UNIV=[
 '하루 한 번, 고마웠던 순간을 말로 표현하기.',
 '서운함은 작을 때 부드럽게 바로 말하기.',
 '일주일에 한 번은 서로에게 온전히 집중하는 시간 만들기.'];

function compat(A,B){
  const axes=[['EI','E','I'],['SN','S','N'],['TF','T','F'],['JP','J','P']];
  let base=72, sim=[], adj=[], tip=[];
  const wSame={EI:3,SN:11,TF:4,JP:4}, wDiff={EI:6,SN:2,TF:6,JP:6};
  axes.forEach(([ax,p1,p2],i)=>{
    const a=A[i], b=B[i], same=a===b;
    base += same? wSame[ax] : wDiff[ax];
    if(same){ sim.push(AXTXT[ax].same[a]); }
    else{ adj.push(AXTXT[ax].diff); tip.push(TIPS_DIFF[ax]); }
  });
  // 동일 유형 보너스, 편차 완화
  if(A===B) base+=4;
  let pct=Math.max(60,Math.min(99,base));
  // tip 구성: 조율 팁 + 보편 팁, 최대 3개
  let tips=tip.slice(0,2);
  for(const u of TIPS_UNIV){ if(tips.length>=3)break; tips.push(u); }
  if(sim.length===0) sim.push('겉보기엔 정반대! 그래서 서로에게 없는 걸 채워주는 자석 같은 사이예요.');
  if(adj.length===0) adj.push('네 축이 모두 닮은 소울메이트형. 편안한 만큼, 새로운 자극을 함께 찾아보면 더 오래 설레요.');
  let head;
  if(pct>=92) head='천생연분 🌈';
  else if(pct>=84) head='환상의 케미 ✨';
  else if(pct>=76) head='잘 맞는 사이 💛';
  else if(pct>=68) head='노력하면 찰떡 🧡';
  else head='서로를 배우는 사이 🌱';
  return {pct, head, sim, adj, tips};
}
let _cntTimer=null;
function calcMatch(){
  const A=document.getElementById('selA').value, B=document.getElementById('selB').value;
  if(!A||!B) return;
  document.getElementById('faceA').textContent=TYPES[A].e;
  document.getElementById('faceB').textContent=TYPES[B].e;
  const r=compat(A,B);
  document.getElementById('matchhead').textContent=r.head;
  const badge=document.getElementById('matchbadge');
  badge.style.display='inline-block';
  badge.textContent=`${A} × ${B}`;
  document.getElementById('m-sim').innerHTML=r.sim.map(s=>'· '+s).join('<br>');
  document.getElementById('m-adj').innerHTML=r.adj.map(s=>'· '+s).join('<br>');
  document.getElementById('m-tip').innerHTML=r.tips.map(s=>'☑ '+s).join('<br>');
  // 카운트업
  const el=document.getElementById('pct'); clearInterval(_cntTimer);
  let cur=0; const target=r.pct;
  _cntTimer=setInterval(()=>{ cur+=Math.max(1,Math.ceil((target-cur)/6)); if(cur>=target){cur=target;clearInterval(_cntTimer);} el.textContent=cur+'%'; },28);
  pop(el);
  vibrate(20);
}
function toMatchFromResult(){
  go('match');
  if(myType){ document.getElementById('selA').value=myType; }
  calcMatch();
}
function cheer(){
  const A=document.getElementById('selA').value, B=document.getElementById('selB').value;
  const r=compat(A,B);
  toast(`${A} × ${B} = ${r.pct}% · ${r.head}`);
  vibrate([30,50,30,50,120]);
  boom(window.innerWidth/2, window.innerHeight*0.4, true);
  setTimeout(()=>boom(window.innerWidth*0.3, window.innerHeight*0.5, false),180);
  setTimeout(()=>boom(window.innerWidth*0.7, window.innerHeight*0.5, false),300);
}

/* init */
fillSelects();
document.getElementById('selA').value='ENFP';
document.getElementById('selB').value='INFJ';
</script>
</body>
</html>
