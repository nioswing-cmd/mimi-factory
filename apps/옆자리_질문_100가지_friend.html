<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>옆자리 질문 100가지</title>
<meta name="description" content="여행길·카페·차 안에서 부담 없이 주고받는 랜덤 대화 질문 100 — 한 질문에 둘 다 답하기.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#1a1230; --bg2:#2d1b4e;
    --accent1:#ffd56b; --accent2:#ffb347;
    --cream:#fff6ec; --muted:#cdbfe0;
    --card:#241a3d;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Noto Sans KR',sans-serif;
    color:var(--cream);
    background:
      radial-gradient(120% 80% at 80% -10%, rgba(255,180,90,.10), transparent 55%),
      radial-gradient(120% 90% at 10% 110%, rgba(255,94,138,.12), transparent 55%),
      linear-gradient(160deg,var(--bg1),var(--bg2));
    background-attachment:fixed;
    transition:background .9s ease;
    min-height:100dvh;
    overflow-x:hidden;
  }
  .wrap{
    max-width:520px; margin:0 auto; min-height:100dvh;
    display:flex; flex-direction:column;
    padding:22px 20px 16px;
  }
  .screen{display:none; flex:1; flex-direction:column; animation:fadeIn .5s ease;}
  .screen.on{display:flex;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}

  /* ---------- HOME ---------- */
  .brand-eyebrow{
    font-size:13px; letter-spacing:.28em; color:var(--accent1);
    text-align:center; margin-top:14px; font-weight:500; opacity:.85;
  }
  .title{
    font-family:'Jua',sans-serif; font-weight:400;
    font-size:clamp(40px,13vw,58px); line-height:1.05; text-align:center;
    margin:10px 0 6px;
    background:linear-gradient(105deg,#ffd56b,#ff8a5b 45%,#ff5e8a);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  .sub{text-align:center; color:var(--muted); font-size:15px; line-height:1.6; margin-bottom:22px;}
  .sub b{color:var(--cream); font-weight:700;}

  .names{
    display:flex; gap:10px; margin:0 0 20px;
  }
  .names input{
    flex:1; min-width:0; border:1.5px solid rgba(255,255,255,.16);
    background:rgba(255,255,255,.05); color:var(--cream);
    border-radius:14px; padding:14px 14px; font-size:15px;
    font-family:inherit; text-align:center; transition:border-color .2s;
  }
  .names input::placeholder{color:rgba(255,255,255,.4);}
  .names input:focus{outline:none; border-color:var(--accent2);}
  .names .vs{align-self:center; color:var(--accent1); font-family:'Jua'; font-size:20px;}

  .modes{display:flex; flex-direction:column; gap:14px;}
  .mode{
    position:relative; border:none; cursor:pointer; text-align:left;
    border-radius:22px; padding:22px 20px; color:var(--cream);
    font-family:inherit; overflow:hidden;
    background:rgba(255,255,255,.045);
    border:1.5px solid rgba(255,255,255,.1);
    transition:transform .18s ease, box-shadow .25s ease, border-color .2s;
  }
  .mode:active{transform:scale(.97);}
  .mode:hover{border-color:rgba(255,255,255,.28); box-shadow:0 14px 40px -18px rgba(0,0,0,.7);}
  .mode .badge{
    display:inline-block; font-family:'Jua'; font-size:34px; line-height:1;
    margin-bottom:6px;
  }
  .mode h3{font-family:'Jua'; font-weight:400; font-size:23px; margin-bottom:6px;}
  .mode p{color:var(--muted); font-size:14px; line-height:1.55;}
  .mode .glow{
    position:absolute; inset:0; opacity:.16; z-index:-0;
    pointer-events:none;
  }
  .mode.deep{background:linear-gradient(135deg,rgba(255,94,138,.16),rgba(196,78,196,.10));}
  .mode.deep:hover{box-shadow:0 16px 44px -16px rgba(255,94,138,.45);}
  .mode.deep h3{background:linear-gradient(100deg,#ff8a5b,#ff5e8a); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
  .mode.light{background:linear-gradient(135deg,rgba(255,213,107,.16),rgba(255,179,71,.10));}
  .mode.light:hover{box-shadow:0 16px 44px -16px rgba(255,179,71,.45);}
  .mode.light h3{background:linear-gradient(100deg,#ffd56b,#ffb347); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
  .home-tip{
    margin-top:auto; padding-top:20px; text-align:center;
    color:var(--muted); font-size:12.5px; line-height:1.6; opacity:.8;
  }

  /* ---------- PLAY ---------- */
  .topbar{display:flex; align-items:center; gap:12px; margin-bottom:14px;}
  .iconbtn{
    border:none; background:rgba(255,255,255,.07); color:var(--cream);
    width:40px; height:40px; border-radius:12px; cursor:pointer; font-size:17px;
    flex-shrink:0; transition:background .2s;
  }
  .iconbtn:active{background:rgba(255,255,255,.18);}
  .gaugewrap{flex:1;}
  .gaugelabel{display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:6px;}
  .gaugelabel .stage{color:var(--accent1); font-weight:700;}
  .gauge{height:9px; border-radius:99px; background:rgba(255,255,255,.1); overflow:hidden;}
  .gaugefill{
    height:100%; width:0%; border-radius:99px;
    background:linear-gradient(90deg,var(--accent1),var(--accent2));
    box-shadow:0 0 14px 1px var(--accent2);
    transition:width .5s cubic-bezier(.22,1,.36,1), box-shadow .6s;
  }

  .turn{
    text-align:center; font-size:14px; margin:6px 0 14px; color:var(--muted);
  }
  .turn b{
    color:var(--cream); font-weight:700; font-family:'Jua';
    background:linear-gradient(100deg,var(--accent1),var(--accent2));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    font-size:17px;
  }

  .cardzone{flex:1; display:flex; align-items:center; justify-content:center; min-height:0;}
  .card{
    width:100%; border-radius:28px; padding:34px 26px;
    background:
      radial-gradient(130% 100% at 50% 0%, rgba(255,255,255,.07), transparent 60%),
      var(--card);
    border:1.5px solid rgba(255,255,255,.12);
    box-shadow:0 28px 70px -30px rgba(0,0,0,.85), inset 0 1px 0 rgba(255,255,255,.08);
    min-height:300px; display:flex; flex-direction:column;
    position:relative; overflow:hidden;
  }
  .card::before{
    content:""; position:absolute; inset:0;
    background:linear-gradient(135deg, color-mix(in srgb,var(--accent1) 18%,transparent), transparent 55%);
    opacity:.9; pointer-events:none;
  }
  .qnum{
    font-family:'Jua'; font-size:54px; line-height:1; opacity:.22;
    color:var(--accent1); position:relative;
  }
  .qmeta{font-size:12px; letter-spacing:.18em; color:var(--accent1); margin-bottom:8px; position:relative; font-weight:500;}
  .qtext{
    font-family:'Jua'; font-weight:400; font-size:clamp(22px,6.2vw,29px);
    line-height:1.42; position:relative; margin-top:6px; word-break:keep-all;
  }
  .qen{
    margin-top:16px; font-size:13px; line-height:1.55; color:var(--muted);
    position:relative; display:none;
  }
  .qen.show{display:block;}
  .card.pop{animation:pop .42s cubic-bezier(.34,1.56,.64,1);}
  @keyframes pop{
    0%{transform:scale(.9) rotate(-1.5deg); opacity:.4;}
    60%{transform:scale(1.02) rotate(.5deg);}
    100%{transform:scale(1) rotate(0); opacity:1;}
  }

  /* ---------- 홈 버튼 (직관적) ---------- */
  .homebtn{
    display:flex; align-items:center; gap:5px; flex-shrink:0;
    border:none; cursor:pointer; height:40px; padding:0 14px 0 11px;
    border-radius:12px; font-family:'Jua',sans-serif; font-size:14px;
    color:var(--cream); background:rgba(255,255,255,.09);
    transition:background .2s, transform .12s;
  }
  .homebtn:active{transform:scale(.93); background:rgba(255,255,255,.2);}
  .homebtn .hicon{font-size:16px; line-height:1;}

  /* ---------- 봉투 개봉 ---------- */
  .card{cursor:pointer;}
  .card .tapcue{
    position:absolute; bottom:18px; left:0; right:0; text-align:center;
    font-size:12.5px; color:var(--muted); opacity:0; transition:opacity .4s;
    pointer-events:none; z-index:2;
  }
  .card.opened .tapcue{opacity:.8; animation:cuePulse 1.8s ease-in-out infinite;}
  @keyframes cuePulse{0%,100%{opacity:.5;}50%{opacity:.95;}}

  .envelope{
    position:absolute; inset:0; z-index:6; border-radius:28px;
    display:flex; align-items:center; justify-content:center;
    perspective:1000px; overflow:hidden;
  }
  .envelope.gone{opacity:0; transform:scale(1.05); pointer-events:none;
    transition:opacity .45s ease, transform .45s ease;}
  .env-pocket{
    position:absolute; inset:0; border-radius:28px;
    background:linear-gradient(150deg, var(--accent1), var(--accent2));
  }
  .env-pocket::after{
    content:""; position:absolute; left:0; right:0; top:34%; bottom:0;
    background:linear-gradient(170deg, rgba(255,255,255,.13), rgba(0,0,0,.10));
    clip-path:polygon(0 14%, 50% 64%, 100% 14%, 100% 100%, 0 100%);
  }
  .env-flap{
    position:absolute; top:0; left:0; right:0; height:48%;
    background:linear-gradient(165deg, var(--accent1), var(--accent2));
    clip-path:polygon(0 0, 100% 0, 50% 100%);
    transform-origin:top center; transform:rotateX(0deg);
    transition:transform .55s cubic-bezier(.6,-0.28,.34,1.4), filter .5s;
    z-index:4; backface-visibility:hidden; filter:brightness(1.07);
  }
  .envelope.open .env-flap{transform:rotateX(179deg); filter:brightness(.78);}
  .env-seal{
    position:relative; z-index:5; width:58px; height:58px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.95); color:var(--accent2);
    font-family:'Jua',sans-serif; font-size:26px;
    box-shadow:0 8px 22px rgba(0,0,0,.28);
    transition:transform .35s ease, opacity .3s;
  }
  .envelope.open .env-seal{transform:scale(0) rotate(45deg); opacity:0;}
  .env-hint{
    position:absolute; left:0; right:0; bottom:24px; text-align:center;
    color:rgba(34,16,52,.85); font-family:'Jua',sans-serif; font-size:14px;
    letter-spacing:.02em; animation:hintPulse 1.5s ease-in-out infinite;
  }
  .envelope.open .env-hint{opacity:0; transition:opacity .2s;}
  @keyframes hintPulse{0%,100%{transform:translateY(0); opacity:.7;}50%{transform:translateY(-4px); opacity:1;}}
  .envelope.incoming{animation:envIn .42s cubic-bezier(.34,1.4,.5,1);}
  @keyframes envIn{0%{transform:translateY(44px) scale(.92); opacity:0;}100%{transform:translateY(0) scale(1); opacity:1;}}

  .controls{margin-top:16px; display:flex; flex-direction:column; gap:10px;}
  .draw{
    border:none; cursor:pointer; font-family:'Jua'; font-size:20px; color:#21163a;
    padding:18px; border-radius:18px;
    background:linear-gradient(100deg,var(--accent1),var(--accent2));
    box-shadow:0 14px 34px -12px var(--accent2);
    transition:transform .14s ease, box-shadow .2s;
  }
  .draw:active{transform:scale(.96);}
  .subcontrols{display:flex; gap:10px;}
  .ghost{
    flex:1; border:1.5px solid rgba(255,255,255,.16); background:transparent;
    color:var(--muted); font-family:inherit; font-size:14px; padding:12px;
    border-radius:14px; cursor:pointer; transition:background .2s;
  }
  .ghost:active{background:rgba(255,255,255,.08);}

  .toast{
    position:fixed; left:50%; top:84px; transform:translateX(-50%) translateY(-20px);
    background:rgba(36,26,61,.96); border:1.5px solid var(--accent2);
    color:var(--cream); padding:13px 20px; border-radius:99px; font-size:14px;
    box-shadow:0 16px 40px -14px rgba(0,0,0,.8); opacity:0; pointer-events:none;
    transition:opacity .4s, transform .4s; z-index:50; white-space:nowrap; max-width:90vw;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ---------- DONE ---------- */
  .done-inner{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;}
  .done-emoji{font-size:64px; margin-bottom:10px; animation:pop .6s ease;}
  .done-inner h2{font-family:'Jua'; font-weight:400; font-size:30px; margin-bottom:10px;}
  .done-inner p{color:var(--muted); font-size:15px; line-height:1.7; margin-bottom:26px; max-width:340px; word-break:keep-all;}
  .timer{
    font-family:'Jua'; font-size:72px; line-height:1; margin:6px 0 4px;
    background:linear-gradient(105deg,#ffd56b,#ff8a5b 50%,#ff5e8a);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  .timer-note{color:var(--muted); font-size:14px; margin-bottom:22px;}
  .ring{
    width:170px; height:170px; margin:0 auto 16px; position:relative;
  }
  .ring svg{transform:rotate(-90deg);}
  .ring .bg-r{fill:none; stroke:rgba(255,255,255,.1); stroke-width:9;}
  .ring .fg-r{fill:none; stroke:url(#grad); stroke-width:9; stroke-linecap:round;
    transition:stroke-dashoffset 1s linear;}
  .ring .center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}

  /* ---------- FOOTER ---------- */
  .footer{
    text-align:center; margin-top:24px; padding-top:18px;
    border-top:1px solid rgba(255,255,255,.08);
  }
  .mf-eyebrow{display:flex; align-items:center; justify-content:center; gap:11px; margin-bottom:8px;}
  .mf-eyebrow::before,.mf-eyebrow::after{
    content:""; height:1px; width:38px;
    background:linear-gradient(90deg,transparent,rgba(167,139,250,.6));
  }
  .mf-eyebrow::after{transform:scaleX(-1);}
  .mf-eyebrow span{
    font-size:10px; letter-spacing:.42em; text-indent:.42em;
    color:#9a8fc0; font-weight:500; white-space:nowrap;
  }
  .mf-logo{
    font-family:'Jua',sans-serif; font-size:27px; line-height:1; margin-bottom:9px;
    letter-spacing:.01em;
    background:linear-gradient(95deg,#5ee7d8,#7aa6ff 36%,#b78bf5 62%,#ff8ad0);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  .mf-caption{font-size:11.5px; letter-spacing:.1em; color:#9a8fc0;}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }
#toggleEn{display:none}
</style>
</head>
<body>
<div class="wrap">

  <!-- ============ HOME ============ -->
  <section class="screen on" id="home">
    <div class="brand-eyebrow">긴 여행, 옆자리에서</div>
    <h1 class="title">옆자리 질문 100</h1>
    <p class="sub">폰 하나 사이에 두고 번갈아 묻고,<br><b>둘 다 대답하기.</b> 그게 전부예요.</p>

    <div class="names">
      <input id="nameA" type="text" maxlength="6" placeholder="나" aria-label="첫 번째 사람 이름">
      <span class="vs">&amp;</span>
      <input id="nameB" type="text" maxlength="6" placeholder="너" aria-label="두 번째 사람 이름">
    </div>

    <div class="modes">
      <button class="mode light" data-mode="light" style="grid-column:1/-1">
        <span class="badge">💬</span>
        <h3>질문 100가지 시작하기</h3>
        <p>여행길·카페·차 안에서 편하게 주고받는 랜덤 질문 100개.<br>처음 만난 사이도 부담 없이.</p>
      </button>
    </div>

    <div class="home-tip">한 사람만 답하지 말고, 한 질문에 <b style="color:var(--cream)">둘 다</b> 대답하기 🤝</div>
  </section>

  <!-- ============ PLAY ============ -->
  <section class="screen" id="play">
    <div class="topbar">
      <button class="homebtn" id="backHome" aria-label="홈으로 (처음 화면)"><span class="hicon">🏠</span>홈</button>
      <div class="gaugewrap">
        <div class="gaugelabel"><span id="stageLabel" class="stage">Set I</span><span id="countLabel">0 / 12</span></div>
        <div class="gauge"><div class="gaugefill" id="gaugeFill"></div></div>
      </div>
      <button class="iconbtn" id="toggleEn" aria-label="영어 원문 보기" title="영어 원문">A文</button>
    </div>

    <div class="turn" id="turnLine">먼저 답할 사람 → <b id="turnName">나</b></div>

    <div class="cardzone">
      <div class="card" id="card">
        <div class="qnum" id="qnum"></div>
        <div class="qmeta" id="qmeta"></div>
        <div class="qtext" id="qtext"></div>
        <div class="qen" id="qen"></div>
        <div class="tapcue" id="tapcue">화면을 톡 치면 다음 봉투가 와요</div>
        <div class="envelope" id="envelope">
          <div class="env-pocket"></div>
          <div class="env-flap"></div>
          <div class="env-seal">✦</div>
          <div class="env-hint" id="envHint">여기를 톡! 첫 질문 개봉 ✉️</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="subcontrols">
        <button class="ghost" id="prevBtn">← 이전</button>
        <button class="ghost" id="skipBtn">건너뛰기 →</button>
      </div>
    </div>
  </section>

  <!-- ============ DONE ============ -->
  <section class="screen" id="done">
    <div class="done-inner" id="doneInner"></div>
  </section>

  <div class="footer">
    <div class="mf-eyebrow"><span>의 미 와 재 미 공 장</span></div>
    <div class="mf-logo">미미팩토리</div>
    <div class="mf-caption">주식회사 연:결 패밀리회사</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------------- DATA: 36 공식 질문 ---------------- */
const Q36=[
 {s:1,ko:"이 세상 누구나 초대할 수 있다면, 저녁 식사에 누구를 초대하겠어요?",en:"Given the choice of anyone in the world, whom would you want as a dinner guest?"},
 {s:1,ko:"유명해지고 싶어요? 그렇다면 어떤 방식으로?",en:"Would you like to be famous? In what way?"},
 {s:1,ko:"전화를 걸기 전에 무슨 말을 할지 미리 연습해 본 적 있나요? 그렇다면 왜?",en:"Before making a telephone call, do you ever rehearse what you are going to say? Why?"},
 {s:1,ko:"당신이 생각하는 '완벽한 하루'는 어떤 날인가요?",en:"What would constitute a 'perfect' day for you?"},
 {s:1,ko:"마지막으로 혼자 노래해본 게 언제예요? 누군가에게 불러준 적은?",en:"When did you last sing to yourself? To someone else?"},
 {s:1,ko:"90세까지 살되 마지막 60년을 30세의 마음 또는 몸으로 살 수 있다면, 무엇을 택하겠어요?",en:"If you could live to 90 keeping the mind or body of a 30-year-old, which would you want?"},
 {s:1,ko:"당신은 어떤 방식으로 죽음을 맞이할 것 같나요?",en:"Do you have a secret hunch about how you will die?"},
 {s:1,ko:"나와 당신이 공유하는 공통점 세 가지를 찾아보세요.",en:"Name three things you and your partner appear to have in common."},
 {s:1,ko:"살면서 가장 감사하게 생각하는 일은 무엇인가요?",en:"For what in your life do you feel most grateful?"},
 {s:1,ko:"어린 시절 자라난 환경 중 하나를 바꿀 수 있다면 무엇을 바꾸겠어요?",en:"If you could change anything about the way you were raised, what would it be?"},
 {s:1,ko:"당신의 인생 이야기를 몇 분 만에, 중요한 것만 골라 들려주세요.",en:"Take a few minutes and tell your partner your life story in as much detail as possible."},
 {s:1,ko:"내일 아침 한 가지 능력을 얻을 수 있다면 무엇을 고르겠어요?",en:"If you could wake up tomorrow having gained any one quality or ability, what would it be?"},
 {s:2,ko:"무엇이든 알려주는 마법의 구슬에게 단 한 가지만 물을 수 있다면?",en:"If a crystal ball could tell you the truth about anything, what would you want to know?"},
 {s:2,ko:"오랫동안 '꼭 해보고 싶다' 생각한 게 있나요? 왜 아직 안 했어요?",en:"Is there something you've dreamed of doing for a long time? Why haven't you done it?"},

/* ---------------- THEME per stage ---------------- */
const THEMES={
 1:{a1:"#ffd56b",a2:"#ffb347",bg1:"#1a1230",bg2:"#2d1b4e",card:"#241a3d"},
 2:{a1:"#ff8a5b",a2:"#ff6b6b",bg1:"#221031",bg2:"#3a1840",card:"#2c1838"},
 3:{a1:"#ff5e8a",a2:"#c44ec4",bg1:"#250d2e",bg2:"#3d1240",card:"#311236"},
 light:{a1:"#ffd56b",a2:"#ffb347",bg1:"#1a1230",bg2:"#2d1b4e",card:"#241a3d"}
};
function applyTheme(t){
 const r=document.documentElement.style;
 r.setProperty('--accent1',t.a1); r.setProperty('--accent2',t.a2);
 r.setProperty('--bg1',t.bg1); r.setProperty('--bg2',t.bg2); r.setProperty('--card',t.card);
}

/* ---------------- STATE ---------------- */
let mode=null;      // 'deep' | 'light'
let order=[];       // index order
let pos=-1;         // current position in order
let turn=0;         // 0 or 1
let names=["나","너"];
let showEn=false;
let lastStage=null;
let isOpen=false;   // 현재 봉투가 열려 질문이 보이는 상태인지

const $=id=>document.getElementById(id);
function vibrate(ms){ if(navigator.vibrate) try{navigator.vibrate(ms);}catch(e){} }
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function show(scr){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on')); $(scr).classList.add('on'); }

let toastTimer;
function toast(msg){
 const t=$('toast'); t.textContent=msg; t.classList.add('show');
 clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

/* ---------------- START ---------------- */
document.querySelectorAll('.mode').forEach(b=>{
 b.addEventListener('click',()=>{
   const a=$('nameA').value.trim(), bb=$('nameB').value.trim();
   names=[a||"나", bb||"너"];
   startGame(b.dataset.mode);
 });
});

function startGame(m){
 mode=m; pos=0; turn=0; lastStage=null; showEn=false; isOpen=false;
 $('qen').classList.remove('show');
 if(m==='deep'){
   order=Q36.map((_,i)=>i);                 // 순서대로 (점진적 친밀)
   $('toggleEn').style.display='block';
   applyTheme(THEMES[1]);
 }else{
   order=shuffle(Q100.map((_,i)=>i));        // 랜덤 셔플
   $('toggleEn').style.display='none';
   applyTheme(THEMES.light);
 }
 $('card').classList.remove('opened');
 $('toggleEn').style.background='rgba(255,255,255,.07)';
 prepareQuestion();           // 첫 질문을 봉투 뒤에 준비
 resetEnvelope(false);        // 봉투 닫힘(첫 진입)
 $('envHint').textContent='여기를 톡! 첫 질문 개봉 ✉️';
 show('play');
}

function updateTurn(){
 $('turnName').textContent=names[turn];
}
function updateGauge(done){
 const total = mode==='deep' ? 36 : 100;
 const pct = Math.min(100, done/total*100);
 $('gaugeFill').style.width=pct+'%';
 $('countLabel').textContent = done+' / '+total;
 if(mode==='deep'){
   const idx = pos>=0 ? order[pos] : 0;
   const stage = pos>=0 ? Q36[idx].s : 1;
   $('stageLabel').textContent='Set '+['I','II','III'][stage-1];
 }else{
   $('stageLabel').textContent='잡담';
 }
}

/* ---------------- 질문 준비 / 봉투 개봉 ---------------- */
function prepareQuestion(){
 const idx=order[pos];
 if(mode==='deep'){
   const q=Q36[idx];
   $('qnum').textContent=(idx+1);
   $('qmeta').textContent='SET '+['I','II','III'][q.s-1]+' · 질문 '+(idx+1);
   $('qtext').textContent=q.ko;
   $('qen').textContent=q.en;
   $('qen').classList.toggle('show',showEn);
   applyTheme(THEMES[q.s]);
 }else{
   $('qnum').textContent='💬';
   $('qmeta').textContent='질문 '+(pos+1);
   $('qtext').textContent=Q100[idx];
   $('qen').classList.remove('show');
   const hues=[ {a1:"#ffd56b",a2:"#ffb347"},{a1:"#7fdfff",a2:"#5b8aff"},
                {a1:"#a0f0a0",a2:"#4fd1a0"},{a1:"#ff9ecb",a2:"#ff6b9e"},
                {a1:"#ffb38a",a2:"#ff7a5b"} ];
   const h=hues[pos%hues.length];
   const r=document.documentElement.style;
   r.setProperty('--accent1',h.a1); r.setProperty('--accent2',h.a2);
 }
 updateTurn();
 updateGauge(pos+1);
}

function resetEnvelope(incoming){
 const env=$('envelope');
 env.classList.remove('open','gone','incoming');
 void env.offsetWidth;            // reflow
 if(incoming) env.classList.add('incoming');
 isOpen=false;
}

function openEnvelope(){
 if(isOpen) return;
 const env=$('envelope');
 env.classList.add('open');       // 플랩이 활짝 젖혀지고 씰이 사라짐
 vibrate(28);
 // Set 전환 축하 (deep)
 if(mode==='deep'){
   const q=Q36[order[pos]];
   if(lastStage!==null && q.s!==lastStage){
     const msgs={2:'🔥 Set II — 한 걸음 더 깊이',3:'💗 Set III — 가장 가까이'};
     setTimeout(()=>{toast(msgs[q.s]||''); vibrate([20,40,20]);},420);
   }
   lastStage=q.s;
 }
 setTimeout(()=>{
   env.classList.add('gone');     // 봉투가 사라지며 편지(질문)가 짠
   const card=$('card');
   card.classList.add('opened');
   card.classList.remove('pop'); void card.offsetWidth; card.classList.add('pop');
   isOpen=true;
 },360);
}

function advance(){
 if(pos>=order.length-1){ finish(); return; }
 pos++; turn=1-turn;
 prepareQuestion();
 resetEnvelope(true);             // 새 봉투가 아래에서 슉 올라옴(닫힘)
 $('envHint').textContent='톡 치면 개봉 ✉️';
}

/* 카드(=화면) 자체를 누르면: 닫혀있으면 개봉, 열려있으면 다음 봉투 */
$('card').addEventListener('click',()=>{
 if(!isOpen) openEnvelope();
 else advance();
});

$('skipBtn').addEventListener('click',(e)=>{ e.stopPropagation(); advance(); });
$('prevBtn').addEventListener('click',(e)=>{
 e.stopPropagation();
 if(pos<=0){ toast('첫 질문이에요'); return; }
 pos--; turn=1-turn;
 prepareQuestion();
 resetEnvelope(true);
 setTimeout(openEnvelope,140);    // 이미 본 질문이라 바로 다시 열어줌
});
$('toggleEn').addEventListener('click',(e)=>{
 e.stopPropagation();
 showEn=!showEn;
 $('qen').classList.toggle('show', showEn && isOpen);
 $('toggleEn').style.background = showEn ? 'rgba(255,255,255,.22)' : 'rgba(255,255,255,.07)';
});
$('backHome').addEventListener('click',()=>{ applyTheme(THEMES.light); show('home'); });

/* ---------------- FINISH ---------------- */

 const inner=$('doneInner');
 if(mode==='deep'){
   inner.innerHTML=`
     <div class="done-emoji">✨</div>
     <h2>36개를 모두 나눴어요</h2>
     <p>이제 마지막 의식이에요. <b style="color:var(--cream)">4분 동안 말없이 서로의 눈을 바라보기.</b><br>많은 사람이 이 순간에 울었대요. 준비됐다면 시작!</p>
     <div class="ring">
       <svg width="170" height="170" viewBox="0 0 170 170">
         <defs><linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
           <stop offset="0%" stop-color="#ffd56b"/><stop offset="50%" stop-color="#ff8a5b"/><stop offset="100%" stop-color="#ff5e8a"/>
         </linearGradient></defs>
         <circle class="bg-r" cx="85" cy="85" r="76"/>
         <circle class="fg-r" id="ringFg" cx="85" cy="85" r="76"/>
       </svg>
       <div class="center"><div class="timer" id="timer">4:00</div></div>
     </div>
     <div class="timer-note" id="tnote">버튼을 누르면 4분이 시작돼요</div>
     <button class="draw" id="startTimer" style="width:100%; max-width:300px;">👀 눈맞춤 시작</button>
     <div class="subcontrols" style="width:100%; max-width:300px; margin-top:10px;">
       <button class="ghost" id="againDeep">다시 처음부터</button>
       <button class="ghost" id="homeDeep">홈으로</button>
     </div>`;
   show('done');
   setupTimer();
   $('againDeep').onclick=()=>startGame('deep');
   $('homeDeep').onclick=()=>{applyTheme(THEMES.light); show('home');};
 }else{
   inner.innerHTML=`
     <div class="done-emoji">🎉</div>
     <h2>100개를 다 봤어요!</h2>
     <p>이야기가 끊기지 않았다면 성공이에요.<br>한 번 더 섞어서 새 순서로 돌릴까요?</p>
     <button class="draw" id="againLight" style="width:100%; max-width:300px;">🔀 다시 섞어서 시작</button>
     <div class="subcontrols" style="width:100%; max-width:300px; margin-top:10px;">
       <button class="ghost" id="homeLight">홈으로</button>
     </div>`;
   show('done');
   $('againLight').onclick=()=>startGame('light');
   $('homeLight').onclick=()=>{applyTheme(THEMES.light); show('home');};
 }
}

function setupTimer(){
 const R=76, C=2*Math.PI*R;
 const fg=$('ringFg'); fg.style.strokeDasharray=C; fg.style.strokeDashoffset=0;
 let total=240, left=240, iv=null, running=false;
 const tEl=$('timer'), note=$('tnote'), btn=$('startTimer');
 function fmt(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
 btn.onclick=()=>{
   if(running){ // pause
     clearInterval(iv); running=false; btn.textContent='▶ 이어서'; note.textContent='잠깐 멈췄어요';
     return;
   }
   running=true; btn.textContent='⏸ 멈추기'; note.textContent='서로의 눈을 바라보세요…';
   iv=setInterval(()=>{
     left--;
     tEl.textContent=fmt(left);
     fg.style.strokeDashoffset = C*(1-left/total);
     if(left<=0){
       clearInterval(iv); running=false; vibrate([60,80,60,80,120]);
       tEl.textContent='💛'; note.textContent='수고했어요. 지금 이 기분을 기억해요.';
       btn.style.display='none';
     }
   },1000);
 };
}
</script>
