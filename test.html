<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>테스트관 · 도파민 실험실 — 미미팩토리</title>
<meta name="description" content="나를 측정하는 도파민 진단·유형 테스트 모음. 미미팩토리 테스트관">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0f; --panel:#101018; --panel2:#15151f;
    --ink:#eef2ff; --sub:#7d84a3;
    --cyan:#00f0ff; --mag:#ff2ec4; --lime:#b6ff3d;
    --line:rgba(0,240,255,.18);
    --pop:cubic-bezier(.34,1.56,.64,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--ink);
    min-height:100dvh; -webkit-font-smoothing:antialiased;
  }
  /* 스캔라인 + 네온 안개 */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
    background:
      radial-gradient(440px 280px at 85% -40px, rgba(255,46,196,.14), transparent 70%),
      radial-gradient(440px 280px at 6% 16%, rgba(0,240,255,.12), transparent 70%),
      repeating-linear-gradient(0deg, transparent 0 3px, rgba(255,255,255,.014) 3px 4px);
  }
  .wrap{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:24px 18px 40px}

  .nav{display:flex;gap:6px;font-size:11px;margin-bottom:20px;flex-wrap:wrap}
  .nav a{color:var(--sub);text-decoration:none;padding:6px 11px;border-radius:999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.02)}
  .nav a.here{color:#0a0a0f;background:var(--cyan);border-color:var(--cyan);font-weight:700}

  .hero{text-align:center;padding:8px 0 22px}
  .hero .eyebrow{
    font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.34em;text-indent:.34em;
    color:var(--lime);margin-bottom:10px;
  }
  .hero h1{
    font-size:36px;line-height:1.15;font-weight:700;letter-spacing:.02em;
    color:var(--ink);
    text-shadow:0 0 18px rgba(0,240,255,.55), 2px 0 0 rgba(255,46,196,.5), -2px 0 0 rgba(0,240,255,.5);
    animation:glitch 5s steps(1) infinite;
  }
  @keyframes glitch{
    0%,93%,100%{transform:translateX(0)}
    94%{transform:translateX(2px) skewX(2deg)}
    96%{transform:translateX(-2px)}
    98%{transform:translateX(1px) skewX(-1deg)}
  }
  .hero p{font-size:13px;color:var(--sub);margin-top:10px;line-height:1.7}
  .gauge{
    height:7px;border-radius:999px;margin-top:18px;overflow:hidden;background:var(--panel2);
    border:1px solid rgba(255,255,255,.08);
  }
  .gauge i{
    display:block;height:100%;width:62%;border-radius:999px;
    background:linear-gradient(90deg,var(--cyan),var(--lime) 55%,var(--mag));
    animation:fill 2.4s var(--pop) infinite alternate;
  }
  @keyframes fill{from{width:26%}to{width:88%}}

  /* 오늘의 실험 */
  .featured{
    position:relative;margin:18px 0 24px;padding:20px 18px;border-radius:14px;cursor:pointer;overflow:hidden;
    background:var(--panel);border:1px solid var(--line);
    box-shadow:0 0 22px rgba(0,240,255,.10), inset 0 0 34px rgba(0,240,255,.04);
    transition:transform .35s var(--pop);
  }
  .featured:active{transform:scale(.97)}
  .featured::before{content:"";position:absolute;inset:0;opacity:.13;background:var(--tc,linear-gradient(135deg,#00f0ff,#ff2ec4))}
  .featured .tag{
    position:relative;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.2em;
    color:#0a0a0f;background:var(--lime);padding:3px 10px;border-radius:3px;
  }
  .featured h2{position:relative;font-size:24px;margin-top:11px;font-weight:700}
  .featured .meta{position:relative;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--sub);margin-top:5px}
  .featured .desc{position:relative;font-size:13px;color:#c4cae4;margin-top:9px;line-height:1.65}
  .featured .go{
    position:relative;display:inline-block;margin-top:13px;font-family:'IBM Plex Mono',monospace;
    font-size:12px;font-weight:700;color:var(--cyan);
    padding:8px 15px;border:1px solid var(--cyan);border-radius:4px;
    box-shadow:0 0 12px rgba(0,240,255,.25), inset 0 0 8px rgba(0,240,255,.08);
  }

  .search{
    width:100%;padding:11px 16px;margin-bottom:6px;font-size:14px;font-family:inherit;
    color:var(--ink);background:var(--panel);border:1px solid rgba(255,255,255,.1);border-radius:8px;outline:none;
  }
  .search:focus{border-color:var(--cyan);box-shadow:0 0 12px rgba(0,240,255,.2)}
  .count{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--sub);margin:8px 2px 14px;letter-spacing:.08em}

  /* 실험 카드 */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .card{
    position:relative;border-radius:12px;padding:16px 14px;min-height:150px;overflow:hidden;cursor:pointer;
    background:var(--panel);border:1px solid rgba(255,255,255,.09);
    display:flex;flex-direction:column;justify-content:flex-end;
    transition:transform .35s var(--pop),border-color .3s,box-shadow .3s;
    animation:boot .5s var(--pop) backwards;
  }
  .card:nth-child(odd){animation-delay:.05s}.card:nth-child(even){animation-delay:.12s}
  @keyframes boot{from{opacity:0;transform:translateY(14px)}}
  .card:hover{border-color:var(--cyan);box-shadow:0 0 18px rgba(0,240,255,.22)}
  .card:active{transform:scale(.94)}
  .card::before{content:"";position:absolute;inset:0;opacity:.14;background:var(--tc)}
  .card::after{
    content:"";position:absolute;left:0;right:0;top:0;height:2px;
    background:linear-gradient(90deg,var(--cyan),var(--mag));opacity:.75;
  }
  .card .no{
    position:relative;align-self:flex-start;margin-bottom:auto;
    font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:700;letter-spacing:.14em;
    color:var(--lime);
  }
  .card h3{position:relative;font-size:17px;font-weight:700;line-height:1.3;margin-top:20px}
  .card .a{position:relative;font-size:11px;color:var(--sub);margin-top:4px}
  .card .d{position:relative;font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--sub);margin-top:7px;opacity:.8}
  .empty{grid-column:1/-1;text-align:center;color:var(--sub);font-size:13px;padding:36px 0;line-height:1.8}

  /* 푸터 (브랜드 규칙: 수정 금지) */
  .footer{text-align:center;margin-top:36px;padding-top:18px;border-top:1px solid rgba(255,255,255,.08)}
  .mf-eyebrow{display:flex;align-items:center;justify-content:center;gap:11px;margin-bottom:8px}
  .mf-eyebrow::before,.mf-eyebrow::after{content:"";height:1px;width:38px;background:linear-gradient(90deg,transparent,rgba(167,139,250,.6))}
  .mf-eyebrow::after{transform:scaleX(-1)}
  .mf-eyebrow span{font-size:10px;letter-spacing:.42em;text-indent:.42em;color:#9a8fc0;font-weight:500;white-space:nowrap}
  .mf-logo{font-family:'Jua',sans-serif;font-size:27px;line-height:1;margin-bottom:9px;letter-spacing:.01em;
    background:linear-gradient(95deg,#5ee7d8,#7aa6ff 36%,#b78bf5 62%,#ff8ad0);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .mf-caption{font-size:11.5px;letter-spacing:.1em;color:#9a8fc0}

  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <div class="nav">
    <a href="index.html">🏭 미미팩토리</a>
    <a href="quiz.html">📚 독서퀴즈관</a>
    <a class="here" href="test.html">🎯 테스트관</a>
    <a href="friend.html">💞 친해지기관</a>
  </div>

  <div class="hero">
    <div class="eyebrow">MIMI-LAB · DOPAMINE DIVISION</div>
    <h1>도파민 실험실</h1>
    <p>피실험자: 당신. 실험 목표: 나도 몰랐던 나.<br>게이지가 차오르는 동안, 결과를 예측해 보세요.</p>
    <div class="gauge"><i></i></div>
  </div>

  <div id="featured"></div>

  <input class="search" id="q" type="search" placeholder="테스트 검색…">
  <div class="count" id="count"></div>
  <div class="grid" id="grid"></div>

  <div class="footer">
    <div class="mf-eyebrow"><span>의 미 와 재 미 공 장</span></div>
    <div class="mf-logo">미미팩토리</div>
    <div class="mf-caption">주식회사 연:결 패밀리회사</div>
  </div>
</div>

<script>
let APPS=[], query="";

async function load(){
  try{
    const r = await fetch("apps.json?v="+Date.now());
    const j = await r.json();
    APPS = (j.apps||[]).filter(a=>a.type==="test");
  }catch(e){ APPS = []; }
  APPS.sort((a,b)=> (b.date||"").localeCompare(a.date||""));
  renderFeatured(); render();
}

function grad(a){return `linear-gradient(135deg,${a.color1||"#00f0ff"},${a.color2||"#ff2ec4"})`}
function open(a){ if(navigator.vibrate) navigator.vibrate(28); location.href = a.teaser || a.premium; }

function renderFeatured(){
  const a = APPS[0]; if(!a) return;
  const el = document.getElementById("featured");
  el.innerHTML = `
    <div class="featured" style="--tc:${grad(a)}">
      <span class="tag">EXP-LATEST</span>
      <h2>${a.title}</h2>
      <div class="meta">${a.author} · ${a.date||""}</div>
      <div class="desc">${a.desc||""}</div>
      <span class="go">실험 개시 →</span>
    </div>`;
  el.querySelector(".featured").onclick = ()=>open(a);
}

function render(){
  const grid = document.getElementById("grid");
  const list = APPS.filter(a =>
    query==="" || (a.title+a.author).toLowerCase().includes(query)
  );
  document.getElementById("count").textContent = `RUNNING EXPERIMENTS: ${list.length}`;
  grid.innerHTML = list.length ? "" :
    `<div class="empty">실험실이 비어 있어요.<br>새로운 실험이 곧 시작됩니다 ⚗️</div>`;
  list.forEach((a,i)=>{
    const c = document.createElement("div");
    c.className="card"; c.style.setProperty("--tc",grad(a));
    c.innerHTML = `
      <span class="no">EXP-${String(i+1).padStart(3,"0")}</span>
      <h3>${a.title}</h3>
      <div class="a">${a.author}</div>
      <div class="d">${a.date||""}</div>`;
    c.onclick = ()=>open(a);
    grid.appendChild(c);
  });
}

document.getElementById("q").oninput = e=>{ query = e.target.value.trim().toLowerCase(); render(); };
load();
</script>
</body>
</html>
