<!DOCTYPE html>
<html lang="zh-tw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>喜好默契二選一 · 兩人品味大對決</title>
<style id="i18nFonts">
/* self-hosted subset fonts (OFL) — reuse original family names */
@font-face{font-family:'Noto Sans KR';src:url('../fonts/NotoSansTC-sub.woff2') format('woff2');font-weight:100 900;font-display:swap;}
@font-face{font-family:'Jua';src:url('../fonts/NotoSansTC-sub.woff2') format('woff2');font-weight:700;font-display:swap;}
</style>
<style>
  :root{
    --bg1:#161227; --bg2:#241640;
    --warm1:#ff8a5b; --warm2:#ff5e6c;   
    --cool1:#5b8aff; --cool2:#3fd6e0;   
    --gold:#ffd56b;
    --cream:#fff6ec; --muted:#cdbfe0; --card:#221a3a;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Noto Sans KR',sans-serif; color:var(--cream);
    background:
      radial-gradient(120% 80% at 82% -10%, rgba(255,138,91,.10), transparent 55%),
      radial-gradient(120% 90% at 12% 110%, rgba(91,138,255,.12), transparent 55%),
      linear-gradient(160deg,var(--bg1),var(--bg2));
    background-attachment:fixed; min-height:100dvh; overflow-x:hidden;
  }
  .wrap{max-width:520px; margin:0 auto; min-height:100dvh; display:flex; flex-direction:column; padding:22px 20px 16px;}
  .screen{display:none; flex:1; flex-direction:column; animation:fadeIn .5s ease;}
  .screen.on{display:flex;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}

  /* ---------- HOME ---------- */
  .eyebrow{font-size:13px; letter-spacing:.26em; color:var(--gold); text-align:center; margin-top:16px; font-weight:500; opacity:.85;}
  .title{
    font-family:'Jua'; font-size:clamp(40px,13vw,58px); line-height:1.05; text-align:center; margin:10px 0 6px;
    background:linear-gradient(105deg,#ff8a5b,#ff5e6c 40%,#5b8aff 78%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  .sub{text-align:center; color:var(--muted); font-size:15px; line-height:1.6; margin-bottom:22px;}
  .sub b{color:var(--cream); font-weight:700;}
  .names{display:flex; gap:10px; margin:0 0 22px;}
  .names input{
    flex:1; min-width:0; border:1.5px solid rgba(255,255,255,.16); background:rgba(255,255,255,.05);
    color:var(--cream); border-radius:14px; padding:14px; font-size:15px; font-family:inherit; text-align:center; transition:border-color .2s;
  }
  .names input::placeholder{color:rgba(255,255,255,.4);}
  .names input:focus{outline:none; border-color:var(--warm1);}
  .names .vs{align-self:center; color:var(--gold); font-family:'Jua'; font-size:20px;}
  .startbtn{
    border:none; cursor:pointer; font-family:'Jua'; font-size:21px; color:#1a1230; padding:18px; border-radius:18px;
    background:linear-gradient(100deg,var(--warm1),var(--cool1)); box-shadow:0 16px 40px -14px rgba(120,120,255,.5);
    transition:transform .14s ease;
  }
  .startbtn:active{transform:scale(.96);}
  .home-tip{margin-top:auto; padding-top:20px; text-align:center; color:var(--muted); font-size:12.5px; line-height:1.6; opacity:.85;}
  .home-tip b{color:var(--cream);}
  .qcount-label{text-align:center; font-size:13px; color:var(--muted); margin-bottom:10px;}
  .qcounts{display:flex; gap:8px; justify-content:center; margin-bottom:22px; flex-wrap:wrap;}
  .qc{border:1.5px solid rgba(255,255,255,.16); background:rgba(255,255,255,.05); color:var(--cream); font-family:'Jua'; font-size:16px; min-width:54px; padding:11px 14px; border-radius:14px; cursor:pointer; transition:transform .12s, background .2s, color .2s, border-color .2s, box-shadow .2s;}
  .qc.on{background:linear-gradient(100deg,var(--warm1),var(--cool1)); color:#1a1230; border-color:transparent; box-shadow:0 8px 20px -8px var(--cool1);}
  .qc:active{transform:scale(.93);}
  .handoff-inner{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;}
  .ho-emoji{font-size:64px; margin-bottom:14px; animation:pop .6s ease;}
  .ho-done{font-family:'Jua'; font-size:26px; margin-bottom:14px;}
  .ho-msg{color:var(--muted); font-size:15px; line-height:1.75; margin-bottom:28px; max-width:330px; }
  .ho-msg b{color:var(--cream);}
  .handoff-inner .startbtn{width:100%; max-width:300px;}

  /* ---------- PLAY topbar ---------- */
  .topbar{display:flex; align-items:center; gap:12px; margin-bottom:14px;}
  .homebtn{
    display:flex; align-items:center; gap:5px; flex-shrink:0; border:none; cursor:pointer; height:40px;
    padding:0 14px 0 11px; border-radius:12px; font-family:'Jua'; font-size:14px; color:var(--cream);
    background:rgba(255,255,255,.09); transition:background .2s, transform .12s;
  }
  .homebtn:active{transform:scale(.93); background:rgba(255,255,255,.2);}
  .homebtn .hicon{font-size:16px;}
  .gaugewrap{flex:1;}
  .gaugelabel{display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:6px;}
  .gaugelabel .chemi{color:var(--gold); font-weight:700; font-family:'Jua';}
  .gauge{height:9px; border-radius:99px; background:rgba(255,255,255,.1); overflow:hidden;}
  .gaugefill{height:100%; width:0%; border-radius:99px; background:linear-gradient(90deg,#ff5e8a,var(--gold)); box-shadow:0 0 14px 1px var(--gold); transition:width .55s cubic-bezier(.22,1,.36,1);}
  .endbtn{
    flex-shrink:0; border:1.5px solid rgba(255,255,255,.16); background:transparent; color:var(--muted);
    height:40px; padding:0 12px; border-radius:12px; font-family:inherit; font-size:13px; cursor:pointer; transition:background .2s;
  }
  .endbtn:active{background:rgba(255,255,255,.08);}

  .turn{text-align:center; font-size:14px; margin:4px 0 14px; color:var(--muted); min-height:22px;}
  .turn b{color:var(--cream); font-family:'Jua'; font-size:17px;
    background:linear-gradient(100deg,var(--warm1),var(--cool1)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}

  /* ---------- CARD (balance split) ---------- */
  .cardzone{flex:1; display:flex; align-items:center; justify-content:center; min-height:0;}
  .card{
    width:100%; border-radius:28px; position:relative; overflow:hidden; cursor:pointer;
    background:var(--card); border:1.5px solid rgba(255,255,255,.12);
    box-shadow:0 28px 70px -30px rgba(0,0,0,.85), inset 0 1px 0 rgba(255,255,255,.08);
    min-height:420px; display:flex; flex-direction:column;
  }
  .bqlabel{
    position:absolute; top:0; left:0; right:0; z-index:3; text-align:center;
    padding:12px; font-size:12px; letter-spacing:.16em; color:var(--gold); font-weight:500;
    pointer-events:none;
  }
  .bsplit{flex:1; display:flex; flex-direction:column; position:relative;}
  .opt{
    flex:1; border:none; cursor:pointer; color:var(--cream); font-family:inherit; position:relative;
    display:flex; align-items:center; justify-content:center; text-align:center; padding:30px 22px;
    transition:flex .35s ease, filter .25s ease, opacity .25s; overflow:hidden;
  }
  .opt:disabled{cursor:default;}
  .optA{background:linear-gradient(150deg,var(--warm1),var(--warm2));}
  .optB{background:linear-gradient(150deg,var(--cool1),var(--cool2));}
  .opt .optlabel{
    position:absolute; top:14px; left:16px; font-family:'Jua'; font-size:22px; opacity:.55;
  }
  .optA .optlabel{top:auto; bottom:14px;}
  .opttext{font-family:'Jua'; font-size:clamp(20px,5.6vw,27px); line-height:1.35;  max-width:90%; text-shadow:0 2px 8px rgba(0,0,0,.25);}
  .opt .picks{position:absolute; right:14px; display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; max-width:60%;}
  .optA .picks{top:14px;}
  .optB .picks{bottom:14px;}
  .pickchip{
    font-size:12px; font-weight:700; padding:4px 10px; border-radius:99px;
    background:rgba(255,255,255,.92); color:#222; font-family:'Noto Sans KR';
    animation:pop .4s cubic-bezier(.34,1.56,.64,1);
  }
  .opt.win{flex:1.9; filter:saturate(1.15) brightness(1.05);}
  .opt.lose{flex:.7; filter:grayscale(.4) brightness(.7); opacity:.85;}
  .opt.pressed{animation:flash .4s ease;}
  @keyframes flash{0%{filter:brightness(1.4);}100%{filter:brightness(1);}}

  .vsbadge{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:4;
    width:60px; height:60px; border-radius:50%; background:var(--card); border:3px solid rgba(255,255,255,.9);
    display:flex; align-items:center; justify-content:center; font-family:'Jua'; font-size:22px; color:#fff;
    box-shadow:0 8px 22px rgba(0,0,0,.4); transition:transform .3s;
  }
  .bsplit.decided .vsbadge{transform:translate(-50%,-50%) scale(.7); opacity:.6;}

  .bresult{
    position:absolute; bottom:0; left:0; right:0; z-index:5; text-align:center;
    padding:14px; font-family:'Jua'; font-size:18px; transform:translateY(120%); transition:transform .4s cubic-bezier(.34,1.56,.64,1);
    background:linear-gradient(0deg, rgba(20,12,30,.92), transparent);
    pointer-events:none;
  }
  .bresult.show{transform:translateY(0);}

  .tapcue{
    position:absolute; bottom:64px; left:0; right:0; text-align:center; z-index:5;
    font-size:12.5px; color:var(--cream); opacity:0; transition:opacity .4s; pointer-events:none;
  }
  .tapcue.show{opacity:.85; animation:cuePulse 1.7s ease-in-out infinite;}
  @keyframes cuePulse{0%,100%{opacity:.5;}50%{opacity:.95;}}

  /* ---------- envelope ---------- */
  .envelope{position:absolute; inset:0; z-index:8; border-radius:28px; display:flex; align-items:center; justify-content:center; perspective:1000px; overflow:hidden;}
  .envelope.gone{opacity:0; transform:scale(1.05); pointer-events:none; transition:opacity .45s ease, transform .45s ease;}
  .env-pocket{position:absolute; inset:0; border-radius:28px; background:linear-gradient(150deg,#a06bff,#ff6bd0);}
  .env-pocket::after{content:""; position:absolute; left:0; right:0; top:34%; bottom:0; background:linear-gradient(170deg, rgba(255,255,255,.13), rgba(0,0,0,.10)); clip-path:polygon(0 14%, 50% 64%, 100% 14%, 100% 100%, 0 100%);}
  .env-flap{position:absolute; top:0; left:0; right:0; height:48%; background:linear-gradient(165deg,#b07bff,#ff7bd6); clip-path:polygon(0 0, 100% 0, 50% 100%); transform-origin:top center; transform:rotateX(0deg); transition:transform .55s cubic-bezier(.6,-0.28,.34,1.4), filter .5s; z-index:4; backface-visibility:hidden; filter:brightness(1.07);}
  .envelope.open .env-flap{transform:rotateX(179deg); filter:brightness(.78);}
  .env-seal{position:relative; z-index:5; width:58px; height:58px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,.95); color:#c44ec4; font-family:'Jua'; font-size:24px; box-shadow:0 8px 22px rgba(0,0,0,.28); transition:transform .35s ease, opacity .3s;}
  .envelope.open .env-seal{transform:scale(0) rotate(45deg); opacity:0;}
  .env-hint{position:absolute; left:0; right:0; bottom:24px; text-align:center; color:rgba(34,16,52,.85); font-family:'Jua'; font-size:14px; animation:hintPulse 1.5s ease-in-out infinite;}
  .envelope.open .env-hint{opacity:0; transition:opacity .2s;}
  @keyframes hintPulse{0%,100%{transform:translateY(0); opacity:.7;}50%{transform:translateY(-4px); opacity:1;}}
  .envelope.incoming{animation:envIn .42s cubic-bezier(.34,1.4,.5,1);}
  @keyframes envIn{0%{transform:translateY(44px) scale(.92); opacity:0;}100%{transform:translateY(0) scale(1); opacity:1;}}
  @keyframes pop{0%{transform:scale(.9); opacity:.4;}60%{transform:scale(1.04);}100%{transform:scale(1); opacity:1;}}

  /* ---------- toast ---------- */
  .toast{position:fixed; left:50%; top:84px; transform:translateX(-50%) translateY(-20px); background:rgba(34,26,58,.96); border:1.5px solid var(--gold); color:var(--cream); padding:13px 20px; border-radius:99px; font-size:14px; opacity:0; pointer-events:none; transition:opacity .4s, transform .4s; z-index:50; max-width:90vw;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ---------- DONE ---------- */
  .done-inner{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;}
  .done-emoji{font-size:60px; margin-bottom:6px; animation:pop .6s ease;}
  .chemi-big{font-family:'Jua'; font-size:84px; line-height:1; margin:4px 0;
    background:linear-gradient(105deg,#ff5e8a,var(--gold) 60%,#5b8aff); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
  .grade{font-family:'Jua'; font-size:26px; margin-bottom:10px;}
  .done-inner p{color:var(--muted); font-size:15px; line-height:1.7; margin-bottom:24px; max-width:330px; }
  .done-inner .startbtn{width:100%; max-width:300px;}
  .subrow{display:flex; gap:10px; width:100%; max-width:300px; margin-top:10px;}
  .subrow .ghost{flex:1; border:1.5px solid rgba(255,255,255,.16); background:transparent; color:var(--muted); font-family:inherit; font-size:14px; padding:12px; border-radius:14px; cursor:pointer;}
  .subrow .ghost:active{background:rgba(255,255,255,.08);}

  
  #done .done-inner{justify-content:flex-start; padding-top:8px;}
  .rep-title{font-family:'Jua'; font-size:22px; margin-bottom:8px;}
  .rep-title span{color:#ff5e8a;}
  .donut{position:relative; width:180px; height:180px; margin:2px auto 2px;}
  .donut-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .dc-emoji{font-size:34px; line-height:1;}
  .dc-pct{font-family:'Jua'; font-size:36px; line-height:1.1; background:linear-gradient(105deg,#ff5e8a,#ffd56b 60%,#5b8aff); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
  .repbox{width:100%; max-width:360px; background:rgba(255,255,255,.05); border:1.5px solid rgba(255,255,255,.1); border-radius:18px; padding:16px; margin-top:14px;}
  .repbox-h{font-family:'Jua'; font-size:15px; margin-bottom:12px; text-align:left; color:var(--gold);}
  .catrow{display:flex; align-items:center; gap:10px; margin-bottom:9px;}
  .catname{font-size:12.5px; width:98px; text-align:left; flex-shrink:0; color:var(--cream);}
  .catbar{flex:1; height:9px; border-radius:99px; background:rgba(255,255,255,.12); overflow:hidden;}
  .catfill{height:100%; border-radius:99px;}
  .catpct{font-size:12px; width:36px; text-align:right; color:var(--muted); flex-shrink:0; font-weight:700;}
  .catnote{font-size:12px; color:var(--muted); line-height:1.6; margin-top:10px; text-align:left;}
  .catnote b{color:var(--cream);}
  .hi{text-align:left; font-size:14px; line-height:1.5; padding:9px 0;}
  .hi+.hi{border-top:1px solid rgba(255,255,255,.08);}
  .hi-tag{font-family:'Jua'; font-size:13px; margin-bottom:3px; color:var(--gold);}
  .hi b{color:var(--cream);}
  .diffitem{padding:10px 0; border-top:1px solid rgba(255,255,255,.08); text-align:left;}
  .diffitem:first-of-type{border-top:none;}
  .di-row{font-size:13.5px; line-height:1.5; display:flex; gap:7px; align-items:baseline;  color:var(--cream);}
  .di-row+.di-row{margin-top:4px;}
  .who{font-size:11px; font-weight:700; padding:2px 9px; border-radius:99px; flex-shrink:0;}
  .di-a .who{background:rgba(255,138,91,.28); color:#ffcdb0;}
  .di-b .who{background:rgba(91,138,255,.28); color:#bcd0ff;}
  .alltogether{text-align:center; color:var(--gold); font-size:14px; padding:6px 0;}

  /* ---------- FOOTER ---------- */
  .footer{text-align:center; margin-top:24px; padding-top:18px; border-top:1px solid rgba(255,255,255,.08);}
  .mf-eyebrow{display:flex; align-items:center; justify-content:center; gap:11px; margin-bottom:8px;}
  .mf-eyebrow::before,.mf-eyebrow::after{content:""; height:1px; width:38px; background:linear-gradient(90deg,transparent,rgba(167,139,250,.6));}
  .mf-eyebrow::after{transform:scaleX(-1);}
  .mf-eyebrow span{font-size:10px; letter-spacing:.42em; text-indent:.42em; color:#9a8fc0; font-weight:500; white-space:nowrap;}
  .mf-logo{font-family:'Jua'; font-size:27px; line-height:1; margin-bottom:9px; letter-spacing:.01em; background:linear-gradient(95deg,#5ee7d8,#7aa6ff 36%,#b78bf5 62%,#ff8ad0); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
  .mf-caption{font-size:11.5px; letter-spacing:.1em; color:#9a8fc0;}

  @media (prefers-reduced-motion: reduce){*{animation:none !important; transition:none !important;}}
</style>
</head>
<body>
<div class="wrap">

  <!-- ============ HOME ============ -->
  <section class="screen on" id="home">
    <div class="eyebrow">漫長旅途，兩人喜好大對決</div>
    <h1 class="title">喜好默契二選一</h1>
    <p class="sub">兩人先偷偷選 <b>再同時公開！</b><br>從各領域的默契 <b>契合度</b>都幫你算出來。</p>

    <div class="names">
      <input id="nameA" type="text" maxlength="6" placeholder="我" aria-label="第一位的名字">
      <span class="vs">&amp;</span>
      <input id="nameB" type="text" maxlength="6" placeholder="你" aria-label="第二位的名字">
    </div>

    <div class="qcount-label">要玩幾題呢？</div>
    <div class="qcounts" id="qcounts">
      <button class="qc" data-n="5">5</button>
      <button class="qc on" data-n="10">10</button>
      <button class="qc" data-n="20">20</button>
      <button class="qc" data-n="30">30</button>
      <button class="qc" data-n="50">50</button>
      <button class="qc" data-n="100">100</button>
      <button class="qc" data-n="300">全部</button>
    </div>

    <button class="startbtn" id="startBtn">⚔️ 開始契合對決</button>

    <div class="home-tip">一個人先全部作答 → 把手機交給對方 → 換人作答後 → <b>契合度公開！</b> 🎉</div>
  </section>

  <!-- ============ PLAY ============ -->
  <section class="screen" id="play">
    <div class="topbar">
      <button class="homebtn" id="backHome" aria-label="回首頁"><span class="hicon">🏠</span>首頁</button>
      <div class="gaugewrap">
        <div class="gaugelabel"><span class="chemi" id="roundLabel">—</span><span id="countLabel">0/0</span></div>
        <div class="gauge"><div class="gaugefill" id="gaugeFill"></div></div>
      </div>
    </div>

    <div class="turn" id="turnLine">點一下畫面，打開第一封信 ✉️</div>

    <div class="cardzone">
      <div class="card" id="card">
        <div class="bqlabel" id="bqlabel">你的選擇是？</div>
        <div class="bsplit" id="bsplit">
          <button class="opt optA" id="optA">
            <span class="optlabel">A</span>
            <span class="opttext" id="optAtext"></span>
            <span class="picks" id="picksA"></span>
          </button>
          <button class="opt optB" id="optB">
            <span class="optlabel">B</span>
            <span class="opttext" id="optBtext"></span>
            <span class="picks" id="picksB"></span>
          </button>
          <div class="vsbadge">VS</div>
        </div>
        <div class="bresult" id="bresult"></div>
        <div class="tapcue" id="tapcue">點一下畫面看下一封信 ✉️</div>

        <div class="envelope" id="envelope">
          <div class="env-pocket"></div>
          <div class="env-flap"></div>
          <div class="env-seal">⚔</div>
          <div class="env-hint" id="envHint">點這裡！打開第一回合 ✉️</div>
        </div>
      </div>
    </div>
  </section>

  <!-- ============ HANDOFF ============ -->
  <section class="screen" id="handoff">
    <div class="handoff-inner">
      <div class="ho-emoji">🤝</div>
      <div class="ho-done" id="hoDone"></div>
      <div class="ho-msg" id="hoMsg"></div>
      <button class="startbtn" id="hoBtn"></button>
    </div>
  </section>

  <!-- ============ DONE ============ -->
  <section class="screen" id="done">
    <div class="done-inner" id="doneInner"></div>
  </section>

  <div class="hall-nav" style="text-align:center;margin:22px 0 4px"><a href="https://mimifactory.vibekr.com/zh-tw/test.html" target="_blank" rel="noopener" style="display:inline-block;padding:10px 22px;border:1px solid rgba(128,128,128,.45);border-radius:999px;color:inherit;text-decoration:none;font-size:.92rem;opacity:.85">🧪 多巴胺實驗室 — 去看看其他測驗 →</a></div>
  <div class="footer">
    <div class="mf-eyebrow"><span>意 義 與 趣 味 工 廠</span></div>
    <div class="mf-logo">咪咪工廠</div>
    <div class="mf-caption">YEON:GYEOL股份有限公司 家族公司</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

const BAL=[
 {a:"一輩子只吃韓式料理",b:"一輩子只吃西式料理",c:"food"},

 {a:"豪華飯店",b:"文青風民宿",c:"travel"},
 {a:"團體套裝旅遊",b:"自由背包旅行",c:"travel"},
 {a:"溫暖度假勝地",b:"異國風情城市",c:"travel"},
 {a:"事先規劃行程",b:"到當地再隨性決定",c:"travel"},
 {a:"火車旅行",b:"自駕旅行",c:"travel"},
 {a:"知名拍照景點",b:"在地人巷弄",c:"travel"}
];

/* ---------------- STATE ---------------- */
const CAT_LABELS={food:'🍽️ 飲食喜好',love:'💕 戀愛風格',power:'✨ 想像力',work:'💰 金錢與工作',daily:'🎲 生活感',travel:'✈️ 旅行風格',value:'🌿 人生價值觀',celeb:'🌟 流行文化喜好',hobby:'🎨 興趣．喜好',hero:'🏛️ 人物．偉人'};
let order=[], names=["我","你"];
let nQ=10;                      // 已選題數
let round=0;                    // 0: 第一位，1: 第二位
let pos=0;                      // 本輪目前位置
let answers=[[],[]];            // answers[round][i] = 'A' | 'B'
let phase='closed';             // 'closed' | 'choosing' | 'moving'
let isOpen=false;

const $=id=>document.getElementById(id);
function vibrate(ms){ if(navigator.vibrate) try{navigator.vibrate(ms);}catch(e){} }
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function show(scr){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on')); $(scr).classList.add('on'); }
let _tt; function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2000); }


$('qcounts').addEventListener('click',e=>{
 const b=e.target.closest('.qc'); if(!b) return;
 document.querySelectorAll('.qc').forEach(x=>x.classList.remove('on'));
 b.classList.add('on'); nQ=parseInt(b.dataset.n,10);
});


$('startBtn').addEventListener('click',()=>{
 const a=$('nameA').value.trim(), b=$('nameB').value.trim();
 names=[a||"我", b||"你"];
 startGame();
});

function startGame(){
 order=shuffle(BAL.map((_,i)=>i)).slice(0, Math.min(nQ, BAL.length));
 round=0; pos=0; answers=[[],[]];
 beginRound();
}

function beginRound(){
 pos=0; isOpen=false;
 prepareQuestion();
 resetEnvelope(false);
 $('roundLabel').textContent=names[round]+' 順序';
 $('countLabel').textContent='0/'+order.length;
 $('gaugeFill').style.width='0%';
 $('envHint').textContent='點這裡！開啟第一題 ✉️';
 $('turnLine').innerHTML='<b>'+names[round]+'</b>，點一下畫面開始！';
 show('play');
}


function prepareQuestion(){
 const q=BAL[order[pos]];
 phase='closed';
 $('optAtext').textContent=q.a;
 $('optBtext').textContent=q.b;
 $('picksA').innerHTML=''; $('picksB').innerHTML='';
 $('optA').className='opt optA'; $('optB').className='opt optB';
 $('optA').disabled=false; $('optB').disabled=false;
 $('bsplit').classList.remove('decided');
 $('bresult').classList.remove('show'); $('bresult').textContent='';
 $('tapcue').classList.remove('show');
 $('bqlabel').textContent='你的選擇是？';
}

function resetEnvelope(incoming){
 const env=$('envelope');
 env.classList.remove('open','gone','incoming');
 void env.offsetWidth;
 if(incoming) env.classList.add('incoming');
 isOpen=false;
}

function openEnvelope(){
 if(isOpen) return;
 const env=$('envelope');
 env.classList.add('open'); vibrate(28);
 setTimeout(()=>{
   env.classList.add('gone');
   isOpen=true; phase='choosing';
   $('bqlabel').textContent='Q'+(pos+1)+'．你的選擇是？';
   $('turnLine').innerHTML='<b>'+names[round]+'</b> — 點選你喜歡的一邊！';
 },360);
}

function pick(side){
 if(phase!=='choosing') return;
 phase='moving';
 answers[round][pos]=side;
 vibrate(20);
 const win = side==='A'?$('optA'):$('optB');
 const lose= side==='A'?$('optB'):$('optA');
 win.classList.add('pressed','win'); lose.classList.add('lose');
 $('optA').disabled=true; $('optB').disabled=true;
 $('bsplit').classList.add('decided');
 $('countLabel').textContent=(pos+1)+'/'+order.length;
 $('gaugeFill').style.width=((pos+1)/order.length*100)+'%';
 setTimeout(()=>{
   pos++;
   if(pos<order.length){
     prepareQuestion();
     resetEnvelope(true);
     $('envHint').textContent='✉️';
     $('turnLine').innerHTML='下一個信封開啟中…';
     setTimeout(openEnvelope, 430);   // 從第二次開始自動開啟
   }else if(round===0){
     handoff();
   }else{
     finish();
   }
 },540);
}


$('card').addEventListener('click',()=>{ if(phase==='closed' && !isOpen) openEnvelope(); });
$('optA').addEventListener('click',(e)=>{ e.stopPropagation(); pick('A'); });
$('optB').addEventListener('click',(e)=>{ e.stopPropagation(); pick('B'); });
$('backHome').addEventListener('click',()=>{ show('home'); });


function handoff(){
 $('hoDone').textContent='✓ '+names[0]+' 完成！';
 $('hoMsg').innerHTML='現在請把手機交給 <b>'+names[1]+'</b>。<br>回答完同樣的 '+order.length+'題後，就會公開契合度。<br><span style="opacity:.65">(前一位的答案是秘密喔 🤫)</span>';
 $('hoBtn').textContent='我是 '+names[1]+' －開始！';
 show('handoff');
 vibrate([20,40,20]);
}
$('hoBtn').addEventListener('click',()=>{ round=1; beginRound(); });


function gradeOf(pct){
 if(pct>=90) return {e:'💞',g:'命中注定的靈魂伴侶',d:'品味幾乎一模一樣，根本是心電感應等級！'};
 if(pct>=70) return {e:'🧡',g:'絕配拍檔',d:'默契超合拍，一起出門超輕鬆！'};
 if(pct>=50) return {e:'😊',g:'普通還行的默契',d:'合的時候很合，不合的時候也不合，剛剛好的平衡！'};
 if(pct>=30) return {e:'😆',g:'鬥嘴拉鋸戰',d:'品味常常不一樣，所以才更不會膩吧？'};
 return {e:'⚡',g:'完全相反的魅力',d:'品味完全不同！彼此一定能學到很多。'};
}

function finish(){

 let matched=0; const history=[];
 for(let i=0;i<order.length;i++){
   const q=BAL[order[i]];
   const p0=answers[0][i], p1=answers[1][i];
   const same=(p0===p1); if(same) matched++;
   history.push({c:q.c, same, p0, p1, q});
 }
 const answered=order.length;
 const pct=answered?Math.round(matched/answered*100):0;
 const G=gradeOf(pct);


 const byCat={};
 history.forEach(h=>{ (byCat[h.c]=byCat[h.c]||{t:0,m:0}); byCat[h.c].t++; if(h.same) byCat[h.c].m++; });
 const cats=Object.keys(byCat).map(c=>({c, pct:Math.round(byCat[c].m/byCat[c].t*100), t:byCat[c].t})).sort((x,y)=>y.pct-x.pct);
 const catRows=cats.map(o=>{
   const col=o.pct>=67?'#ffd56b':(o.pct>=34?'#ff8a5b':'#5b8aff');
   return '<div class="catrow"><span class="catname">'+CAT_LABELS[o.c]+'</span><div class="catbar"><div class="catfill" style="width:'+o.pct+'%;background:'+col+';box-shadow:0 0 10px '+col+'aa;"></div></div><span class="catpct">'+o.pct+'%</span></div>';
 }).join('');
 const topCat=cats[0], lowCat=cats[cats.length-1];


 const sames=history.filter(h=>h.same), diffs=history.filter(h=>!h.same);
 let highlight='';
 if(sames.length){
   const s=sames[Math.floor(Math.random()*sames.length)];
   const t=s.p0==='A'?s.q.a:s.q.b;
   highlight='<div class="hi hi-same"><div class="hi-tag">💞 兩人選了一樣的答案</div><b>「'+t+'”</b></div>';
 }
 let diffList='';
 if(diffs.length){
   diffList=diffs.map(d=>{
     const t0=d.p0==='A'?d.q.a:d.q.b, t1=d.p1==='A'?d.q.a:d.q.b;
     return '<div class="diffitem"><div class="di-row di-a"><span class="who">'+names[0]+'</span>'+t0+'</div><div class="di-row di-b"><span class="who">'+names[1]+'</span>'+t1+'</div></div>';
   }).join('');
 }else{
   diffList='<div class="alltogether">完全一致！沒有任何一題選得不一樣 💞</div>';
 }

 const R=72, C=2*Math.PI*R, off=C*(1-pct/100);
 $('doneInner').innerHTML=
   '<div class="rep-title">'+names[0]+' <span>❤</span> '+names[1]+' 契合度</div>'+
   '<div class="donut"><svg width="180" height="180" viewBox="0 0 180 180">'+
     '<defs><linearGradient id="dg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff5e8a"/><stop offset="55%" stop-color="#ffd56b"/><stop offset="100%" stop-color="#5b8aff"/></linearGradient></defs>'+
     '<circle cx="90" cy="90" r="'+R+'" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="13"/>'+
     '<circle cx="90" cy="90" r="'+R+'" fill="none" stroke="url(#dg)" stroke-width="13" stroke-linecap="round" stroke-dasharray="'+C+'" stroke-dashoffset="'+C+'" transform="rotate(-90 90 90)" id="donutFg"/>'+
   '</svg><div class="donut-center"><div class="dc-emoji">'+G.e+'</div><div class="dc-pct">'+pct+'%</div></div></div>'+
   '<div class="grade">'+G.g+'</div>'+
   '<p>'+answered+'題中，<b style="color:var(--cream)">'+matched+'</b>次選擇相同！<br>'+G.d+'</p>'+
   '<div class="repbox"><div class="repbox-h">各領域契合度</div>'+catRows+
     '<div class="catnote">最合拍的領域是 <b>'+CAT_LABELS[topCat.c]+'</b>'+(cats.length>1?'，差異最大的是 <b>'+CAT_LABELS[lowCat.c]+'</b>':'')+' 🌟</div></div>'+
   (highlight?'<div class="repbox">'+highlight+'</div>':'')+
   '<div class="repbox"><div class="repbox-h">⚡ 意見不合的 '+diffs.length+'題</div>'+diffList+'</div>'+
   '<button class="startbtn" id="againBtn">🔀 換新題目再玩一次</button>'+
   '<div class="subrow"><button class="ghost" id="homeBtn2">回首頁</button></div>';
 show('done');
 requestAnimationFrame(()=>{ const fg=$('donutFg'); if(fg){ fg.style.transition='stroke-dashoffset 1.1s cubic-bezier(.22,1,.36,1)'; fg.style.strokeDashoffset=off; } });
 vibrate([20,40,20]);
 $('againBtn').onclick=startGame;
 $('homeBtn2').onclick=()=>show('home');
}

</script>
</body>
