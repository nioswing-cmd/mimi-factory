<style>
:root{

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0;}
body{

.pop{animation:pop .42s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{0%{transform:scale(.9) rotate(-1.2deg); opacity:.4;}60%{transform:scale(1.02) rotate(.4deg);}100%{transform:scale(1) rotate(0); opacity:1;}}
@keyframes fadeIn{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}
.fade{animation:fadeIn .5s ease both;}
@keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}


.home{flex:1; display:flex; flex-direction:column; justify-content:center; text-align:center; gap:16px;}
.sig-emoji{font-size:62px; line-height:1; animation:floaty 3.4s ease-in-out infinite;}
.home h1{font-size:33px; margin:6px 0 0;}

.chips{display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:2px;}

.lenbox{margin-top:4px;}

.seg{display:flex; gap:9px; justify-content:center;}

  transition:transform .15s, border-color .25s, background .3s, box-shadow .3s;
}
.segbtn:active{transform:scale(.97);}
.segbtn:focus-visible{outline:3px solid var(--accent1); outline-offset:2px;}
.segbtn .n{font-size:24px; line-height:1;}
.segbtn .u{font-size:12px; color:var(--muted); display:block; margin-top:3px; font-family:'Noto Sans KR',sans-serif;}
.segbtn .tag{font-size:10.5px; color:var(--muted); display:block; margin-top:5px; font-family:'Noto Sans KR',sans-serif; opacity:.8;}
.segbtn.sel{
  border-color:var(--accent2);
  background:linear-gradient(160deg,rgba(91,228,200,.16),rgba(196,78,196,.12));
  box-shadow:0 8px 22px -10px var(--accent2);
}
.segbtn.sel .u,.segbtn.sel .tag{color:var(--cream); opacity:.95;}
.btn{
  font-family:'Jua',sans-serif; font-size:19px; border:none; cursor:pointer;

  background:linear-gradient(95deg,var(--accent1),var(--accent2));

}
.btn:active{transform:scale(.97);}
.btn:focus-visible{outline:3px solid var(--accent1); outline-offset:3px;}
.btn.ghost{background:rgba(255,255,255,.07); color:var(--cream); box-shadow:none; border:1px solid rgba(255,255,255,.14);}
.note{font-size:12px; color:var(--muted); opacity:.85; line-height:1.6;}


.topbar{position:sticky; top:0; z-index:5; padding:8px 0 12px; background:linear-gradient(180deg,var(--bg1) 72%,transparent);}

.backline{margin-top:16px; text-align:center;}

.result{flex:1; display:flex; flex-direction:column; gap:16px;}

.rlight .big{font-size:66px; line-height:1;}

.rblock{background:var(--card); border:1px solid rgba(255,255,255,.09); border-radius:18px; padding:17px 18px;}
.rblock h3{font-family:'Jua',sans-serif; font-weight:400; font-size:16px; margin:0 0 7px; display:flex; align-items:center; gap:7px;}

.dims{display:flex; flex-direction:column; gap:12px;}
.dim .dhead{display:flex; justify-content:space-between; font-size:13.5px; margin-bottom:6px; color:var(--muted);}
.dim .dbar{height:10px; border-radius:99px; background:rgba(255,255,255,.08); overflow:hidden;}
.dim .dfill{height:100%; width:0; border-radius:99px; transition:width 1s cubic-bezier(.22,1,.36,1);}
.ractions{display:flex; flex-direction:column; gap:10px; margin-top:4px;}
.disclaim{font-size:11.5px; color:var(--muted); opacity:.85; line-height:1.6; text-align:center; padding:0 6px;}


.toast{
  position:fixed; left:50%; top:16px; transform:translateX(-50%) translateY(-20px);
  background:rgba(30,23,64,.97); border:1.5px solid var(--accent2); color:var(--cream);
  padding:12px 20px; border-radius:99px; font-size:14px; opacity:0; pointer-events:none;
  transition:opacity .4s, transform .4s; z-index:60; max-width:90vw; text-align:center;

.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}


.hall-nav a{display:inline-block;padding:10px 22px;border:1px solid rgba(171,163,212,.4);border-radius:999px;color:inherit;text-decoration:none;font-size:.92rem;opacity:.85;}
.footer{text-align:center; margin-top:24px; padding-top:18px; border-top:1px solid rgba(255,255,255,.08);}
.mf-eyebrow{display:flex; align-items:center; justify-content:center; gap:11px; margin-bottom:8px;}
.mf-eyebrow::before,.mf-eyebrow::after{content:""; height:1px; width:38px; background:linear-gradient(90deg,transparent,rgba(167,139,250,.6));}
.mf-eyebrow::after{transform:scaleX(-1);}
.mf-eyebrow span{font-size:10px; letter-spacing:.42em; text-indent:.42em; color:#9a8fc0; font-weight:500; white-space:nowrap;}
.mf-logo{font-family:'Jua',sans-serif; font-size:27px; line-height:1; margin-bottom:9px; letter-spacing:.01em;
  background:linear-gradient(95deg,#5ee7d8,#7aa6ff 36%,#b78bf5 62%,#ff8ad0);

.mf-caption{font-size:11.5px; letter-spacing:.1em; color:#9a8fc0;}

@media (prefers-reduced-motion: reduce){*{animation:none !important; transition:none !important;}}
</style>

<script>

// dim: I 不專注 / H 過動·坐不住 / P 衝動 / E 執行功能·時間管理
const DIMS = {
  I:{name:"不專注", emo:"🎯", advice:"專注不是靠意志力，而是靠「環境」抓住的。把干擾從眼前移開，一次只讓一件事出現在視線裡。"},
  H:{name:"過動·坐不住", emo:"⚡", advice:"滿出來的能量不是要消滅，而是要引導出去。用短短的散步·伸展·計時休息，讓身體規律地動一動。"},
  P:{name:"衝動", emo:"🎢", advice:"關鍵是「脫口而出前的 3 秒」。決定·購買·開口之前，給自己一條規則：先等 3 秒，或先擱一個晚上。"},
  E:{name:"執行功能·時間管理", emo:"🧭", advice:"全放在腦子裡，就會全部漏光。把待辦拿到外面（筆記·鬧鐘·行事曆），讓工具去記，而不是大腦。"}
};
const POOL = {
  I:[
    "就算想專心做該做的事，也很快就飄到別的念頭上。",
    "常出小差錯（打錯字·漏東西），得回頭再檢查一遍。",
    "鑰匙·錢包·手機這類東西，常常想不起來放哪了。",
    "聊天或開會到一半會漏掉內容，心想「剛剛講到哪了？」",
    "無聊卻重要的事（文件·整理），特別遲遲下不了手、一直拖。",
    "需要長時間閱讀的文章，很難從頭專注到尾。",
    "手上的事還沒收尾就跳去做別的，結果都只是開了頭。",
    "別人講話時，看起來在聽，腦子卻常常跑到別的地方。"
  ],
  H:[
    "就算安靜坐著，手腳也會動來動去或抖腳。",
    "需要久坐的場合，特別覺得悶、坐不住。",
    "腦中的念頭停不下來，一直轉，靜不下來。",
    "連休息時間也要做點什麼，心裡才踏實。",
    "話會變多，或在對方講完之前就插話。",
    "排隊等候或等紅燈，無聊到特別受不了。",
    "不管身體還是心，總覺得「引擎一直開著」。"
  ],
  P:[
    "還沒想清楚，話或動作就先跑出來了。",
    "一想買什麼，往往忍不住就直接下手。",
    "一想做什麼，還沒衡量後果就先動手再說。",
    "情緒一上來，當下就整個爆發出來。",
    "一無聊就找刺激（手機·影片·零食），手停不下來。",
    "常常臨時起意，跟原本計畫不一樣地改變方向。",
    "有時心想「這句不該說」，話卻已經出口了。",
    "一下子被新事物強烈吸引，很快又失去興趣。"
  ],
  E:[
    "感覺不到時間在走，常被約會或截止期限追著跑。",
    "待辦一多，就不知道該從哪件開始，整個發懵。",
    "計畫是會訂，但要照著做卻很難。",
    "非得等截止期限逼近，引擎才總算發動。",
    "東西·文件·檔案都沒整理好，需要時就找不到。",
    "以為「一下就好」的事，總是比想像中花更久。",
    "同時兼顧好幾件事，就會一件件漏掉。"
  ]
};

function buildPool(){
  const order=['I','H','P','E'], idxs={I:0,H:0,P:0,E:0}, q=[];
  while(q.length<30){
    for(const d of order){ if(idxs[d]<POOL[d].length){ q.push({d, t:POOL[d][idxs[d]]}); idxs[d]++; } }
  }
  return q;
}
const FULL = buildPool(); // 30題 (領域均衡排序)

const SCALE = [
  {t:"完全不會", v:0},
  {t:"很少這樣", v:1},
  {t:"偶爾這樣", v:2},
  {t:"經常這樣", v:3},
  {t:"幾乎總是這樣", v:4}
];

const LEVELS = {
  low:{key:"low", emoji:"🌿", name:"平靜專注型", tag:"低傾向", a1:"#5be4c8", a2:"#34c0a8",
    now:"現在你的專注與執行大致運作良好。ADHD 傾向呈現<b>偏低</b>。偶爾的分心，是每個人都會有的自然起伏。",
    do:"維持你現在的好節奏（睡眠·作息·一次一件）。特別容易分心的日子，先從身體狀態·睡眠·壓力看起就好。",
    care:"分數低，不代表「這跟我無關」。如果某個領域的長條特別高，只要專門顧好那一塊，就會輕鬆很多。"},
  mid:{key:"mid", emoji:"✨", name:"偶爾分心型", tag:"中等傾向", a1:"#ffd764", a2:"#f7ad2e",
    now:"你在專注的日子和分心的日子之間，落差<b>比較明顯</b>。ADHD 傾向屬於<b>中等</b>。對有興趣的事會全神投入，一碰到無聊的事卻特別提不起勁。",
    do:"別靠意志力硬撐，去打造<b>結構</b>。大事切成小塊、25 分鐘專注·5 分鐘休息的計時、待辦寫在看得見的地方 — 這三招就能翻盤。",
    care:"不是「懶」，只是大腦對無聊比較沒轍。與其自責，不如一次加一個適合自己的小裝置，就會慢慢變好。"},
  high:{key:"high", emoji:"⚡", name:"閃爍分心型", tag:"明顯傾向", a1:"#ff8a5b", a2:"#ff6b6b",
    now:"不專注·過動·衝動的訊號<b>明顯地</b>交疊出現。你腦中總是很忙，想做的事很多卻難以收尾，可能常常為此責怪自己。",
    do:"別相信大腦，<b>要相信工具。</b>用鬧鐘·清單·行事曆把記憶放到外面，用「只做 2 分鐘就好」的規則來發動。有效的方法因人而異，當成實驗慢慢找就好。",
    care:"這個測驗不是診斷，是紅綠燈。如果這些特質長期讓你的工作·關係·心情很辛苦，建議去身心科接受正式評估。尋求協助不是軟弱，是策略。"},
  vhigh:{key:"vhigh", emoji:"🌀", name:"風暴能量型", tag:"強烈傾向", a1:"#ff5e8a", a2:"#c44ec4",
    now:"四大領域整體都出現<b>強烈</b>的訊號。這一路你大概比別人多花了好幾倍力氣。這不是努力的問題，而更接近大腦運作的方式不一樣。",
    do:"別想單靠意志力硬撐。除了打理環境（移除干擾·視覺提醒），也到了認真考慮<b>專業協助</b>的時候。真正了解之後，駕馭自己會輕鬆很多。",
    care:"分數高，別嚇自己。ADHD 傾向也和創造力·衝勁·過度投入這些優勢成雙成對。只是如果日常長期很吃力，一定要諮詢身心科。☎ 安心專線 1925"}
};


let LEN=20;                    // 選擇的題目數
let QUESTIONS=[];             // 本次的題目
let idx=0, answers=[];        // answers[i] = value 0..4
let curLevel='low';


function vibrate(ms){ if(navigator.vibrate) try{navigator.vibrate(ms);}catch(e){} }
let _tt; function toast(m){ const t=document.getElementById('toast'); t.innerHTML=m; t.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2100); }
function repop(el){ el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); }
function show(id){ ['home','quiz','result'].forEach(s=>document.getElementById(s).classList.toggle('hidden', s!==id)); }
function levelOf(pct){ return pct<30?'low':(pct<50?'mid':(pct<70?'high':'vhigh')); }
function setAccent(L){
  document.documentElement.style.setProperty('--accent1', L.a1);
  document.documentElement.style.setProperty('--accent2', L.a2);
}


function pickLen(n){
  LEN=n;
  document.querySelectorAll('.segbtn').forEach(b=>b.classList.toggle('sel', +b.dataset.n===n));
  vibrate(16);
}


function currentPct(){ // 以目前答過的題目為基準的累積比例
  const answered = answers.filter(a=>a!=null);
  const sum = answered.reduce((s,v)=>s+v,0);
  const maxSoFar = answered.length*4;
  return maxSoFar? Math.round(sum/maxSoFar*100) : 0;
}
function updateGauge(){
  const answeredCount = answers.filter(a=>a!=null).length;
  const pct = currentPct();
  const lv = answeredCount? levelOf(pct) : 'low';
  const L = LEVELS[lv];
  const g=document.getElementById('gfill');
  g.style.width = (answeredCount? pct:2) + '%';
  setAccent(L);

  const bw=document.getElementById('brainWrap');
  bw.classList.toggle('glow', answeredCount>0);

  const lab=document.getElementById('tlLabel');
  lab.innerHTML = L.emoji+' '+(answeredCount? L.name+' · '+L.tag : '還很平靜');
  lab.style.color = answeredCount? L.a1 : 'var(--cream)';
  document.getElementById('tlCount').textContent = answeredCount+' / '+QUESTIONS.length+' 題';
  document.getElementById('qidx').style.color='var(--accent1)';

  if(answeredCount>0 && lv!==curLevel){
    const climbing = ['low','mid','high','vhigh'].indexOf(lv) > ['low','mid','high','vhigh'].indexOf(curLevel);
    if(climbing){
      if(lv==='mid') toast('✨ 傾向儀表上升了');
      else if(lv==='high') toast('⚡ 抓到明顯的訊號了');
      else if(lv==='vhigh') toast('🌀 偵測到強烈的能量');
      vibrate([18,36,18]);
    }
    repop(lab);
  }
  curLevel = lv;
}


function start(){
  QUESTIONS = FULL.slice(0, LEN);
  idx=0; answers=new Array(QUESTIONS.length).fill(null); curLevel='low';
  setAccent(LEVELS.low);
  show('quiz'); render();
}
function render(){
  const q=QUESTIONS[idx];
  document.getElementById('qidx').textContent = 'Q'+(idx+1);
  const qt=document.getElementById('qtext'); qt.textContent=q.t; repop(qt);
  const box=document.getElementById('opts'); box.innerHTML='';
  SCALE.forEach(s=>{
    const b=document.createElement('button');
    b.className='opt'; b.type='button';
    b.innerHTML='<span class="dot"></span>'+s.t;
    if(answers[idx]===s.v){ b.style.borderColor='var(--accent2)'; const d=b.querySelector('.dot'); d.style.background='var(--accent2)'; d.style.borderColor='var(--accent2)'; }
    b.onclick=(e)=>choose(s.v, e);
    box.appendChild(b);
  });
  document.getElementById('backBtn').style.visibility = idx===0? 'hidden':'visible';
  updateGauge();
}
function choose(v, e){
  answers[idx]=v;
  vibrate(24);
  burst(e);
  updateGauge();
  setTimeout(()=>{
    if(idx < QUESTIONS.length-1){ idx++; render(); }
    else finish();
  }, 300);
}
function goBack(){ if(idx>0){ idx--; render(); } }


function finish(){
  const total = answers.reduce((s,v)=>s+v,0);
  const MAX = QUESTIONS.length*4;
  const pct = Math.round(total/MAX*100);
  const lv = levelOf(pct);
  const L = LEVELS[lv];

  const dimScore={I:0,H:0,P:0,E:0}, dimCount={I:0,H:0,P:0,E:0};
  QUESTIONS.forEach((q,i)=>{ dimScore[q.d]+=answers[i]; dimCount[q.d]++; });
  const dimPct={}; Object.keys(dimScore).forEach(k=> dimPct[k]= dimCount[k]? Math.round(dimScore[k]/(dimCount[k]*4)*100):0 );
  const topDim = Object.keys(dimPct).sort((a,b)=>dimPct[b]-dimPct[a])[0];

  setAccent(L);

  const dimBars = Object.keys(DIMS).map(k=>{
    const p=dimPct[k]; const dl=levelOf(p); const c=LEVELS[dl];
    return `<div class="dim">
      <div class="dhead"><span>${DIMS[k].emo} ${DIMS[k].name}</span><span>${p}%</span></div>
      <div class="dbar"><div class="dfill" data-w="${p}" style="background:linear-gradient(90deg,${c.a1},${c.a2});"></div></div>
    </div>`;
  }).join('');

  const topInfo = (lv==='low')
    ? `其中相對比較突出的領域是 <b>${DIMS[topDim].name}</b>。不必太擔心，但只要稍微留意這一塊，就會更輕鬆。`
    : `訊號最強的領域是 <b>${DIMS[topDim].emo} ${DIMS[topDim].name}</b>。 ${DIMS[topDim].advice}`;

  const bgMap = {
    low:'rgba(52,192,168,.20)', mid:'rgba(247,173,46,.22)',
    high:'rgba(255,107,107,.22)', vhigh:'rgba(196,78,196,.24)'
  };
  const bg = `radial-gradient(120% 120% at 50% 0%, ${bgMap[lv]}, rgba(30,23,64,.4))`;

  document.getElementById('result').innerHTML = `
    <div class="rlight fade" style="background:${bg}; border-color:${L.a2}55;">
      <div class="big">${L.emoji}</div>
      <h2 style="color:${L.a1}">${L.name}</h2>
      <div class="pct">ADHD 傾向 指數 ${pct}分 / 100 · ${L.tag}</div>
    </div>
    <div class="rblock fade"><h3>🔎 現在的你</h3><p>${L.now}</p></div>
    <div class="rblock fade"><h3>🧩 各領域的訊號</h3><div class="dims">${dimBars}</div>
      <p style="margin-top:13px; font-size:13.5px; color:var(--muted);">${topInfo}</p></div>
    <div class="rblock fade"><h3>✅ 試試這樣做</h3><p>${L.do}</p></div>
    <div class="rblock fade"><h3>⚠️ 請記得</h3><p>${L.care}</p></div>
    <div class="ractions">
      <button class="btn" onclick="shareResult('${L.name}',${pct})">分享結果 📤</button>
      <button class="btn ghost" onclick="restart()">再測一次 🔄</button>
    </div>
    <p class="disclaim">這個測驗不是醫學診斷，而是回顧自己的自我檢視工具。<br>如果日常已經辛苦很久，請去身心科接受正式評估。 ☎ 安心專線 1925</p>
  `;
  show('result');

  requestAnimationFrame(()=>setTimeout(()=>{
    document.querySelectorAll('.dfill').forEach(el=>el.style.width=el.dataset.w+'%');
  },120));

  vibrate([60,80,60]);
  if(lv==='low'){ toast('🌿 現在是平靜的狀態'); cannon(L.a1,L.a2); setTimeout(()=>cannon(L.a1,L.a2),260); }
  else if(lv==='mid'){ toast('✨ 光是察覺，就已經解決一半了'); cannon(L.a1,L.a2); }
  else if(lv==='high'){ toast('⚡ 不是你的錯，只是大腦的運作方式'); cannon(L.a1,L.a2); }
  else { toast('🌀 一路努力到這裡的你，真的辛苦了'); cannon(L.a1,L.a2); setTimeout(()=>cannon(L.a1,L.a2),260); }
}
function restart(){ show('home'); setAccent(LEVELS.low); }

function shareResult(name, pct){
  const url='https://mimifactory.vibekr.com/zh-tw/apps/adhd-test.html';
  const text=`🧠 ADHD 傾向測驗結果: ${name} (指數 ${pct}分)\n我現在的專注力狀態如何？你也來測測 👉`;
  if(navigator.share){ navigator.share({title:'ADHD 傾向測驗', text, url}).catch(()=>{}); }
  else{
    const t=text+'\n'+url;
    if(navigator.clipboard){ navigator.clipboard.writeText(t).then(()=>toast('📋 結果已複製！')).catch(()=>toast(t)); }
    else toast('👉 '+url);
  }
}


const cv=document.getElementById('fx'); const ctx=cv.getContext('2d');
let parts=[]; function fitCanvas(){ cv.width=innerWidth; cv.height=innerHeight; } fitCanvas(); addEventListener('resize',fitCanvas);
const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
function burst(e){ // 點擊位置的小煙火
  if(reduce||!e) return;
  const x=e.clientX||innerWidth/2, y=e.clientY||innerHeight/2;
  const cs=getComputedStyle(document.documentElement);
  const c1=cs.getPropertyValue('--accent1').trim(), c2=cs.getPropertyValue('--accent2').trim();
  for(let i=0;i<16;i++){ parts.push({x,y,vx:(Math.random()-.5)*6,vy:(Math.random()-.7)*6-2,r:Math.random()*3+2,c:Math.random()<.5?c1:c2,life:1}); }
  run();
}
function cannon(c1,c2){
  if(reduce) return;
  for(let i=0;i<90;i++){ parts.push({x:innerWidth/2,y:innerHeight*.4,vx:(Math.random()-.5)*13,vy:(Math.random()-.5)*13-3,r:Math.random()*4+2,c:Math.random()<.5?c1:c2,life:1}); }
  run();
}
let raf=null;
function run(){ if(raf) return; const loop=()=>{ ctx.clearRect(0,0,cv.width,cv.height); parts.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=.22; p.life-=.02; ctx.globalAlpha=Math.max(p.life,0); ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill(); }); parts=parts.filter(p=>p.life>0 && p.y<cv.height+20); ctx.globalAlpha=1; if(parts.length) raf=requestAnimationFrame(loop); else raf=null; }; raf=requestAnimationFrame(loop); }
</script>
</body>
