# ─────────────────────────────────────────────
# 미미팩토리 매일 자동 생산 워크플로우
# 매일 06:00 KST (= 21:00 UTC 전날)에 자동 실행.
# Actions 탭 > Run workflow 버튼으로 언제든 수동 실행도 가능.
# ─────────────────────────────────────────────
name: 미미팩토리 매일 자동 생산

on:
  schedule:
    - cron: "0 21 * * *"   # 21:00 UTC = 한국시간 오전 6시
  workflow_dispatch:        # 수동 실행 버튼 활성화

permissions:
  contents: write           # 결과물을 리포에 commit 하기 위해 필요

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: 리포 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치 (Claude Code 실행용)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Claude Code 설치
        run: npm install -g @anthropic-ai/claude-code

      - name: 오늘의 앱 생산
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python3 scripts/build_from_sheet.py

      - name: 결과물 커밋 & 배포
        run: |
          git config user.name "mimi-factory-bot"
          git config user.email "bot@mimifactory.local"
          git add apps/ apps.json
          git diff --cached --quiet && echo "변경 없음" || git commit -m "🏭 오늘의 신작 자동 생산 ($(date +%Y-%m-%d))"
          git push
