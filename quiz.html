<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>퀴즈로읽는책 · 밤의 서재</title>
<meta name="description" content="하루 10분, 퀴즈로 한 권을 완독하는 서재. 매일 밤 새 책이 꽂힙니다.">
<meta name="theme-color" content="#0d1526">
<meta property="og:title" content="퀴즈로읽는책 · 밤의 서재">
<meta property="og:description" content="하루 10분, 퀴즈로 한 권을 완독하는 서재. 매일 밤 새 책이 꽂힙니다.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://mimifactory.vibekr.com/quiz.html">
<meta name="twitter:card" content="summary">
<link rel="manifest" href="manifest-quiz.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d1526; --bg2:#111c31; --panel:#142036;
    --ink:#f2ead8; --sub:#8fa1c0; --amber:#e8b45f; --amber2:#f5d491;
    --line:rgba(232,180,95,.16); --wood:#3a2f22;
    --pop:cubic-bezier(.34,1.56,.64,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--ink);
    min-height:100dvh; -webkit-font-smoothing:antialiased;
  }
  /* 캔들라이트 */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:
      radial-gradient(520px 300px at 78% -60px, rgba(232,180,95,.20), transparent 70%),
      radial-gradient(380px 260px at 8% 30%, rgba(232,180,95,.06), transparent 70%);
    animation:flicker 5s ease-in-out infinite;
  }
  @keyframes flicker{0%,100%{opacity:1}47%{opacity:.85}53%{opacity:.96}72%{opacity:.88}}
  .wrap{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:24px 18px 40px}

  /* 관 내비 */
  .nav{display:flex;gap:6px;font-size:11px;margin-bottom:20px;flex-wrap:wrap}
  .nav a{
    color:var(--sub);text-decoration:none;padding:6px 11px;border-radius:999px;
    border:1px solid var(--line);background:rgba(255,255,255,.02);
  }
  .nav a.here{color:#0d1526;background:var(--amber);border-color:var(--amber);font-weight:700}

  /* 히어로 */
  .hero{text-align:center;padding:8px 0 24px}
  .hero .eyebrow{font-size:10.5px;letter-spacing:.4em;text-indent:.4em;color:var(--sub);margin-bottom:10px}
  .hero h1{
    font-family:'Gowun Batang',serif;font-weight:700;font-size:36px;line-height:1.2;color:var(--amber2);
    text-shadow:0 0 26px rgba(232,180,95,.25);
  }
  .hero p{font-size:13px;color:var(--sub);margin-top:10px;line-height:1.75}
  .hero .cta{
    display:inline-block;margin-top:16px;font-size:14.5px;font-weight:700;text-decoration:none;
    color:#0d1526;background:linear-gradient(120deg,var(--amber2),var(--amber));
    padding:12px 26px;border-radius:999px;
    box-shadow:0 4px 18px rgba(232,180,95,.35);
    transition:transform .35s var(--pop);
  }
  .hero .cta:active{transform:scale(.95)}
  .feats{display:flex;gap:8px;margin-top:20px}
  .feat{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;
    background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:12px 6px;font-size:10.5px;color:var(--sub);line-height:1.4;text-align:center;
  }
  .feat span{font-size:20px}
  .hero .rule{width:74px;height:1px;margin:20px auto 0;background:linear-gradient(90deg,transparent,var(--amber),transparent)}

  /* 이 달의 신간 */
  .newbook{
    display:flex;gap:16px;align-items:stretch;margin:4px 0 26px;padding:16px;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;cursor:pointer;
    transition:transform .35s var(--pop);
  }
  .newbook:active{transform:scale(.97)}
  .newbook .cover{
    flex:0 0 86px;border-radius:4px 10px 10px 4px;position:relative;overflow:hidden;min-height:120px;
    background:var(--nc,linear-gradient(135deg,#e8b45f,#a06b2a));
    box-shadow:6px 8px 18px rgba(0,0,0,.45);
  }
  .newbook .cover::before{content:"";position:absolute;top:0;bottom:0;left:7px;width:1px;background:rgba(0,0,0,.28)}
  .newbook .cover .ct{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:8px 8px 8px 14px;
    font-family:'Gowun Batang',serif;font-weight:700;font-size:13px;line-height:1.4;color:#fff;
    text-align:center;text-shadow:0 1px 6px rgba(0,0,0,.5);word-break:keep-all;
  }
  .newbook .info{flex:1;display:flex;flex-direction:column;justify-content:center}
  .newbook .badge{align-self:flex-start;font-size:10px;font-weight:700;letter-spacing:.16em;color:#0d1526;background:var(--amber);padding:3px 10px;border-radius:999px}
  .newbook h2{font-family:'Gowun Batang',serif;font-size:21px;margin-top:9px;color:var(--ink)}
  .newbook .meta{font-size:11.5px;color:var(--sub);margin-top:4px}
  .newbook .desc{font-size:12px;color:#c8bfae;margin-top:8px;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .newbook .go{font-size:12px;color:var(--amber);margin-top:9px;font-weight:700}

  /* 검색 */
  .search{
    width:100%;padding:11px 16px;margin-bottom:6px;font-size:14px;font-family:inherit;
    color:var(--ink);background:var(--bg2);border:1px solid var(--line);border-radius:10px;outline:none;
  }
  .search:focus{border-color:var(--amber)}
  .count{font-size:11.5px;color:var(--sub);margin:8px 2px 14px}

  /* 서가 (책표지 그리드) */
  .shelf{
    display:grid;grid-template-columns:repeat(3,1fr);gap:14px 12px;
    padding-bottom:18px;border-bottom:6px solid var(--wood);border-radius:0 0 3px 3px;
    box-shadow:0 8px 0 -4px rgba(0,0,0,.35);
    margin-bottom:26px;
  }
  .book{
    position:relative;aspect-ratio:2/3;border-radius:3px 9px 9px 3px;overflow:hidden;cursor:pointer;
    background:var(--bc,linear-gradient(160deg,#5a4a7a,#2c2440));
    box-shadow:5px 7px 14px rgba(0,0,0,.5), inset -6px 0 12px rgba(0,0,0,.18);
    transition:transform .35s var(--pop),box-shadow .35s;
    animation:rise .5s var(--pop) backwards;
  }
  .book:nth-child(3n+1){animation-delay:.03s}.book:nth-child(3n+2){animation-delay:.09s}.book:nth-child(3n){animation-delay:.15s}
  @keyframes rise{from{opacity:0;transform:translateY(16px)}}
  .book:hover{transform:translateY(-7px)}
  .book:active{transform:scale(.94)}
  .book::before{content:"";position:absolute;top:0;bottom:0;left:8px;width:1px;background:rgba(0,0,0,.3)}
  .book::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.12),transparent 28%,transparent 62%,rgba(0,0,0,.34))}
  .book .bt{
    position:absolute;inset:0;z-index:1;display:flex;flex-direction:column;justify-content:center;align-items:center;
    padding:10px 8px 10px 15px;text-align:center;
  }
  .book .bt h3{
    font-family:'Gowun Batang',serif;font-weight:700;font-size:14.5px;line-height:1.42;color:#fff;
    text-shadow:0 1px 7px rgba(0,0,0,.55);word-break:keep-all;
  }
  .book .bt .a{font-size:9.5px;color:rgba(255,255,255,.85);margin-top:7px;letter-spacing:.05em;text-shadow:0 1px 4px rgba(0,0,0,.5)}
  .book .tape{
    position:absolute;top:7px;right:7px;z-index:2;font-size:8.5px;font-weight:700;letter-spacing:.08em;
    color:#0d1526;background:var(--amber);padding:2px 7px;border-radius:999px;
  }
  .empty{text-align:center;color:var(--sub);font-size:13px;padding:38px 0;line-height:1.8}

  .subscribe{
    display:block;text-align:center;margin-top:26px;padding:15px;
    font-size:13.5px;color:var(--ink);text-decoration:none;
    background:var(--panel);border:1px dashed var(--amber);border-radius:14px;
  }
  .subscribe b{color:var(--amber2)}

  /* 푸터 (브랜드 규칙: 수정 금지) */
  .footer{text-align:center;margin-top:36px;padding-top:18px;border-top:1px solid rgba(255,255,255,.08)}
  .mf-eyebrow{display:flex;align-items:center;justify-content:center;gap:11px;margin-bottom:8px}
  .mf-eyebrow::before,.mf-eyebrow::after{content:"";height:1px;width:38px;background:linear-gradient(90deg,transparent,rgba(167,139,250,.6))}
  .mf-eyebrow::after{transform:scaleX(-1)}
  .mf-eyebrow span{font-size:10px;letter-spacing:.42em;text-indent:.42em;color:#9a8fc0;font-weight:500;white-space:nowrap}
  .mf-logo{font-family:'Jua',sans-serif;font-size:27px;line-height:1;margin-bottom:9px;letter-spacing:.01em;
    background:linear-gradient(95deg,#5ee7d8,#7aa6ff 36%,#b78bf5 62%,#ff8ad0);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .mf-caption{font-size:11.5px;letter-spacing:.1em;color:#9a8fc0}

  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <div class="nav">
    <a href="index.html">🏭 미미팩토리</a>
    <a class="here" href="quiz.html">📚 독서퀴즈관</a>
    <a href="test.html">🎯 테스트관</a>
    <a href="friend.html">💞 친해지기관</a>
  </div>

  <div class="hero">
    <div class="eyebrow">퀴 즈 로 읽 는 책</div>
    <h1>밤의 서재</h1>
    <p>하루 10분, 퀴즈로 한 권을 완독하는 서재.<br>매일 밤, 새 책이 꽂힙니다.</p>
    <a class="cta" id="heroCta" href="#">🕯️ 오늘의 책 펼치기 →</a>
    <div class="feats">
      <div class="feat"><span>📖</span>매일 새 책<br>한 권</div>
      <div class="feat"><span>🔁</span>도파민 반복<br>마스터 퀴즈</div>
      <div class="feat"><span>📜</span>완독 인포그래픽<br>리포트</div>
    </div>
    <div class="rule"></div>
  </div>

  <div id="newbook"></div>

  <input class="search" id="q" type="search" placeholder="책 제목, 작가 검색…">
  <div class="count" id="count"></div>
  <div class="shelf" id="shelf"></div>

  <a class="subscribe" href="https://blog.naver.com/4u_doumi?utm_source=quizbook&utm_medium=landing" target="_blank" rel="noopener">
    🕯️ 매일 밤 새 책 소식 받기 — <b>독서위키</b> →
  </a>

  <div class="footer">
    <div class="mf-eyebrow"><span>의 미 와 재 미 공 장</span></div>
    <div class="mf-logo">미미팩토리</div>
    <div class="mf-caption">주식회사 연:결 패밀리회사</div>
  </div>
</div>

<script>
let APPS=[], query="", PROMO=false, BOOKS=new Set();

/* ?app=1 → 스토어 등록판(단일 앱 모드): 다른 관으로 가는 내비 숨김 */
if (new URLSearchParams(location.search).get("app")==="1") localStorage.setItem("mf_app_quiz","1");
if (localStorage.getItem("mf_app_quiz")==="1") document.querySelector(".nav").style.display="none";

/* ── 프로모션 풀버전 오픈 (관리실 admin.html에서 토글) ── */
const VIP_CODE="vip-6f3153";
const vipParam = new URLSearchParams(location.search).get("vip");
if (vipParam===VIP_CODE) localStorage.setItem("mf_vip","1");
if (vipParam==="off") localStorage.removeItem("mf_vip");
const VIP = localStorage.getItem("mf_vip")==="1";
function fullOpen(){ return PROMO || VIP; }
function bookOpen(a){ return fullOpen() || BOOKS.has(a.id); }
function showPromoBadge(){
  if(!fullOpen() || document.getElementById("promoBadge")) return;
  const d=document.createElement("div");
  d.id="promoBadge";
  d.style.cssText="position:sticky;top:0;z-index:60;text-align:center;padding:9px 14px;font-size:13.5px;font-weight:700;color:#241505;background:linear-gradient(100deg,#ffd166,#e8b45f);letter-spacing:.02em;";
  d.textContent = VIP && !PROMO ? "💌 VIP 초대 — 모든 책이 풀버전으로 열립니다" : "🎁 지금 전 서가 풀버전 무료 오픈 중!";
  document.body.prepend(d);
}

async function load(){
  try{
    const pr = await fetch("promo-api.php?action=get&t="+Date.now());
    const pj = await pr.json();
    PROMO = !!pj.open;
    BOOKS = new Set(pj.books || []);
  }catch(e){ PROMO = false; BOOKS = new Set(); }
  showPromoBadge();
  try{
    const r = await fetch("apps.json?v="+Date.now());
    const j = await r.json();
    APPS = (j.apps||[]).filter(a=>a.type==="quiz");
  }catch(e){ APPS = []; }
  APPS.sort((a,b)=> (b.date||"").localeCompare(a.date||""));
  renderNew(); render();
}

function grad(a){return `linear-gradient(160deg,${a.color1||"#e8b45f"},${a.color2||"#a06b2a"})`}
function open(a){ if(navigator.vibrate) navigator.vibrate(28); location.href = bookOpen(a) ? (a.premium || a.teaser) : (a.teaser || a.premium); }

function renderNew(){
  const a = APPS[0]; if(!a) return;
  const el = document.getElementById("newbook");
  el.innerHTML = `
    <div class="newbook" style="--nc:${grad(a)}">
      <div class="cover"><div class="ct">${a.title}</div></div>
      <div class="info">
        <span class="badge">${bookOpen(a)?'🎁 지금 풀버전 무료':'🕯️ 이 달의 신간'}</span>
        <h2>${a.title}</h2>
        <div class="meta">${a.author} · ${a.date||""}</div>
        <div class="desc">${a.desc||""}</div>
        <span class="go">첫 장을 펼치기 →</span>
      </div>
    </div>`;
  el.querySelector(".newbook").onclick = ()=>open(a);
  const cta = document.getElementById("heroCta");
  if (cta) cta.onclick = ev=>{ ev.preventDefault(); open(a); };
}

function render(){
  const shelf = document.getElementById("shelf");
  const list = APPS.filter(a =>
    query==="" || (a.title+a.author).toLowerCase().includes(query)
  );
  document.getElementById("count").textContent = `서가에 꽂힌 책 ${list.length}권`;
  shelf.innerHTML = list.length ? "" :
    `<div class="empty" style="grid-column:1/-1">이 서가엔 아직 책이 없어요.<br>내일 새벽, 공장이 새 책을 구워올 거예요 🕯️</div>`;
  list.forEach(a=>{
    const b = document.createElement("div");
    b.className="book"; b.style.setProperty("--bc",grad(a));
    b.innerHTML = `
      <span class="tape"${bookOpen(a)?' style="background:linear-gradient(100deg,#ffd166,#e8b45f);color:#241505;font-weight:700;"':''}>${bookOpen(a)?'🎁 풀버전':'QUIZ'}</span>
      <div class="bt"><h3>${a.title}</h3><div class="a">${a.author}</div></div>`;
    b.onclick = ()=>open(a);
    shelf.appendChild(b);
  });
}

document.getElementById("q").oninput = e=>{ query = e.target.value.trim().toLowerCase(); render(); };
load();
</script>
</body>
</html>
